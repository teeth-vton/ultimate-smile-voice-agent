<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Fluent Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #usd-chat-container {
            width: 320px;
            max-height: 280px;
            background-color: #111111;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
        }

        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }

        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: left; font-size: 11px; background: rgba(255,68,68,0.1); padding: 6px; border-radius: 5px; margin-top: 5px; }
        .msg-system { color: #888; font-style: italic; text-align: center; font-size: 11px; }

        #usd-status-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 8px;
            font-weight: bold;
        }

        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
            user-select: none;
        }

        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon { color: #111111; font-weight: bold; font-size: 24px; }

        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }
        
        .usd-listening {
            box-shadow: 0 0 15px 5px rgba(0, 255, 128, 0.4) !important; /* Green glow when listening */
        }

        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <div id="usd-voice-widget">
        <div id="usd-chat-container">
            <div id="usd-chat-log"></div>
            <div id="usd-status-box">Initializing...</div>
        </div>
        
        <div id="usd-bubble" onclick="handleBubbleClick()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // PASTE YOUR KEYS HERE
        const GEMINI_API_KEY = "AIzaSyCjLxZxm0ba4pKXkR60ldGg1TzDtRX9nuQ"; 
        const SARVAM_API_KEY = "sk_1g2qtc7g_Lme6F0ta58Wv4SooxWVfUCfa"; 
        
        let agentState = 'off'; // States: 'off', 'listening', 'thinking', 'speaking'
        let chatHistory = [];
        let recognition;
        let audioPlayer;

        // Initialize Ear
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; // Browser natively waits for you to finish your sentence
            recognition.interimResults = false;
            recognition.lang = 'en-IN'; 
        }

        window.onload = () => {
            audioPlayer = document.getElementById('usd-html-player');
            setupRecognitionCallbacks();
        };

        // This controls the flow based on what the agent is currently doing
        async function handleBubbleClick() {
            const container = document.getElementById('usd-chat-container');
            
            if (agentState === 'off') {
                // TURN ON
                container.style.display = 'flex';
                updateState('speaking', "Speaking greeting...");
                
                audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD";
                audioPlayer.play().catch(() => {});

                const greeting = "Hello! How did you like our virtual try-on? What are your thoughts on it?";
                logMessage('bot', greeting);
                
                await speakWithFallback(greeting);
                updateState('listening', "Listening... Speak now!");
                
            } else if (agentState === 'speaking') {
                // BARGE-IN: User interrupts the bot to speak
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                logMessage('system', 'You interrupted the bot.');
                updateState('listening', "Listening... Speak now!");
                
            } else {
                // TURN OFF entirely if clicked while listening/thinking
                updateState('off', "");
                if(recognition) recognition.abort();
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                container.style.display = 'none';
            }
        }

        function updateState(newState, statusText) {
            agentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            statusBox.innerText = statusText;
            bubble.className = ''; // Reset classes
            
            if (newState === 'listening') {
                bubble.classList.add('usd-listening');
                try { recognition.start(); } catch(e) {}
            } 
            else if (newState === 'thinking') {
                bubble.classList.add('usd-speaking'); // Gold pulse while thinking
                try { recognition.stop(); } catch(e) {}
            }
            else if (newState === 'speaking') {
                bubble.classList.add('usd-speaking');
            }
        }

        function setupRecognitionCallbacks() {
            if (!recognition) return;

            recognition.onresult = async (event) => {
                if (agentState !== 'listening') return;
                
                const userText = event.results[0][0].transcript.trim();
                
                // Patience Filter: Ignore random noises or 1-word accidents (less than 2 characters)
                if (userText.length < 2) {
                    try { recognition.stop(); } catch(e){}
                    setTimeout(() => updateState('listening', "Listening... Speak now!"), 500);
                    return;
                }

                logMessage('user', userText);
                updateState('thinking', "Thinking...");
                
                try {
                    const botReply = await askGeminiWithRetry(userText);
                    
                    if (agentState === 'off') return; // User turned it off while thinking
                    
                    logMessage('bot', botReply);
                    updateState('speaking', "Speaking...");
                    
                    await speakWithFallback(botReply);
                    
                    if (agentState === 'speaking') {
                        updateState('listening', "Listening... Speak now!");
                    }

                } catch (error) {
                    logMessage('error', `Fatal Error: ${error.message}`);
                    updateState('listening', "Listening... Try again.");
                }
            };

            recognition.onerror = (event) => {
                if (agentState === 'listening' && event.error === 'no-speech') {
                    // Loop the microphone if the user is just quiet
                    try { recognition.stop(); } catch(e){}
                    setTimeout(() => {
                        if (agentState === 'listening') recognition.start();
                    }, 200);
                }
            };

            recognition.onend = () => {
                if (agentState === 'listening') {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        // INTELLIGENT AUTO-RETRY LOGIC
        async function askGeminiWithRetry(userText, retriesLeft = 2) {
            const tempHistory = [...chatHistory, { role: "user", parts: [{ text: userText }] }];
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: {
                            parts: [{ 
                                text: "You are the official voice assistant for Ultimate Smile Design. Keep replies to 1 short sentence max. DETECT THE USER'S LANGUAGE: If the user speaks English, reply in English. If they speak Hindi or Hinglish, reply in Hindi/Hinglish. Only answer dental or smile design questions." 
                            }]
                        },
                        contents: tempHistory
                    })
                });
                
                if (response.status === 429) {
                    if (retriesLeft > 0) {
                        document.getElementById('usd-status-box').innerText = "Google Rate Limit. Pausing for 3s...";
                        logMessage('system', 'Rate limit hit. Automatically retrying...');
                        await new Promise(r => setTimeout(r, 3000));
                        return askGeminiWithRetry(userText, retriesLeft - 1); // Try again!
                    } else {
                        throw new Error("Too many requests. Please wait a minute and try again.");
                    }
                }
                
                if (!response.ok) throw new Error(`Gemini API Error ${response.status}`);

                const data = await response.json();
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    chatHistory = tempHistory; // Save successful history
                    chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                    return botReply;
                } else {
                    throw new Error("Invalid format received from AI.");
                }
            } catch (err) {
                throw err;
            }
        }
