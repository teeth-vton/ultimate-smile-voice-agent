<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #usd-chat-container {
            width: 320px;
            max-height: 280px;
            background-color: #111111;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
        }

        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }

        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: left; font-size: 11px; background: rgba(255,68,68,0.1); padding: 6px; border-radius: 5px; margin-top: 5px; }

        #usd-status-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 8px;
        }

        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
        }

        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon { color: #111111; font-weight: bold; font-size: 24px; }

        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }

        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <div id="usd-voice-widget">
        <div id="usd-chat-container">
            <div id="usd-chat-log"></div>
            <div id="usd-status-box">Initializing...</div>
        </div>
        
        <div id="usd-bubble" onclick="toggleVoiceAgent()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // 1. MUST USE A KEY STARTING WITH 'AIza' HERE!! If it starts with 'AQ.' it will crash with a 401 error.
        const GEMINI_API_KEY = "AIzaSyCjLxZxm0ba4pKXkR60ldGg1TzDtRX9nuQ"; 
        
        // 2. YOUR SARVAM KEY
        const SARVAM_API_KEY = "sk_1g2qtc7g_Lme6F0ta58Wv4SooxWVfUCfa"; 
        
        let isAgentRunning = false;
        let chatHistory = [];
        let recognition;
        let audioPlayer;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            // Set microphone to listen for English first, but it will still catch Hindi accents
            recognition.lang = 'en-IN'; 
        }

        window.onload = () => {
            audioPlayer = document.getElementById('usd-html-player');
            setupRecognitionCallbacks();
        };

        async function toggleVoiceAgent() {
            const container = document.getElementById('usd-chat-container');
            const bubble = document.getElementById('usd-bubble');
            const statusBox = document.getElementById('usd-status-box');

            if (isAgentRunning) {
                isAgentRunning = false;
                if(recognition) recognition.abort();
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                bubble.classList.remove('usd-speaking');
                container.style.display = 'none';
                return;
            }

            isAgentRunning = true;
            container.style.display = 'flex';
            bubble.classList.add('usd-speaking');
            statusBox.innerText = "Speaking greeting...";
            
            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD";
            audioPlayer.play().catch(() => {});

            // Greeting is now in English to start
            const greeting = "Hello! How did you like our virtual try-on? What are your thoughts on it?";
            logMessage('bot', greeting);
            
            await speakWithFallback(greeting);
            startListeningLoop();
        }

        function startListeningLoop() {
            if (!isAgentRunning || !recognition) return;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            bubble.classList.remove('usd-speaking');
            statusBox.innerText = "Listening... Speak now!";
            
            try {
                recognition.start();
            } catch(e) {}
        }

        function setupRecognitionCallbacks() {
            if (!recognition) return;

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                const statusBox = document.getElementById('usd-status-box');
                const bubble = document.getElementById('usd-bubble');
                
                logMessage('user', userText);
                statusBox.innerText = "Thinking...";
                bubble.classList.add('usd-speaking'); 
                
                try {
                    const botReply = await askGeminiBrain(userText);
                    logMessage('bot', botReply);
                    statusBox.innerText = "Speaking...";
                    
                    await speakWithFallback(botReply);
                    startListeningLoop();

                } catch (error) {
                    console.error(error);
                    logMessage('error', `Gemini Error: ${error.message}`);
                    statusBox.innerText = "Failed to process turn.";
                    bubble.classList.remove('usd-speaking');
                    isAgentRunning = false; 
                }
            };

            recognition.onerror = (event) => {
                if (isAgentRunning && event.error === 'no-speech') {
                    startListeningLoop();
                }
            };

            recognition.onend = () => {
                if (isAgentRunning && document.getElementById('usd-status-box').innerText === "Listening... Speak now!") {
                    startListeningLoop();
                }
            };
        }

        async function askGeminiBrain(userText) {
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{ 
                            text: "You are the official voice assistant for Ultimate Smile Design. Keep replies to 1 or 2 short sentences. DETECT THE USER'S LANGUAGE: If the user speaks English, reply in English. If they speak Hindi or Hinglish, reply in Hindi/Hinglish. Only answer dental or smile design questions. If off-topic, politely decline in the user's language." 
                        }]
                    },
                    contents: chatHistory
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP Error ${response.status} - Did you use an AIza key?`);
            }

            const data = await response.json();
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const botReply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                return botReply;
            } else {
                throw new Error("Invalid format received.");
            }
        }

        async function speakWithFallback(text) {
            try {
                // EXACT PAYLOAD REQUESTED BY SARVAM
                const response = await fetch('https://api.sarvam.ai/text-to-speech', {
                    method: 'POST',
                    headers: {
                        'api-subscription-key': SARVAM_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: [text],
                        target_language_code: "hi-IN", // hi-IN with bulbul:v3 natively speaks English perfectly as well!
                        speaker: "anushka",
                        model: "bulbul:v3"
                    })
                });
                
                if (!response.ok) {
                    const errorMsg = await response.text();
                    throw new Error(`Code ${response.status}: ${errorMsg}`);
                }

                const data = await response.json();
                if (data.audios && data.audios[0]) {
                    audioPlayer.src = "data:audio/wav;base64," + data.audios[0];
                    return new Promise((resolve) => {
                        audioPlayer.onended = resolve;
                        audioPlayer.onerror = () => { useBrowserTTS(text, resolve); };
                        audioPlayer.play().catch(() => useBrowserTTS(text, resolve));
                    });
                } else {
                    throw new Error("Empty audio payload arrays.");
                }

            } catch(e) {
                logMessage('error', `Sarvam Error Details: ${e.message}`);
                return new Promise((resolve) => {
                    useBrowserTTS(text, resolve);
                });
            }
        }

        function useBrowserTTS(text, callback) {
            console.log("Routing audio stream via Native Browser Engine Fallback...");
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-IN'; 
            utterance.rate = 1.0;
            utterance.onend = callback;
            utterance.onerror = callback;
            window.speechSynthesis.speak(utterance);
        }

        function logMessage(sender, text) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            
            if (sender === 'user') msgDiv.innerText = "You: " + text;
            else if (sender === 'bot') msgDiv.innerText = "Bot: " + text;
            else msgDiv.innerText = text; 
            
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
