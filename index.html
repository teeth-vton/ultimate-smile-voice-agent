<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #usd-tooltip {
            background: #D4AF37;
            color: #111;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            position: relative;
            cursor: pointer;
            display: block; 
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }
        #usd-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #D4AF37 transparent transparent transparent;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes floatContainer {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        #usd-chat-container {
            width: 320px;
            max-height: 380px;
            background-color: #111111;
            border: 1px solid #333333; 
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            position: relative; 
            animation: floatContainer 4s ease-in-out infinite;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        #usd-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        #usd-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #usd-status-box {
            color: #D4AF37;
            font-size: 13px;
            font-weight: bold;
        }
        #usd-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #usd-mode-toggle {
            background: #222;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #usd-mode-toggle:hover { background: #D4AF37; color: #111; }
        #usd-visualizer {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 20px;
        }
        .usd-bar {
            width: 3px;
            background: #D4AF37;
            border-radius: 3px;
            height: 4px; 
            transition: height 0.2s ease;
        }
        #usd-visualizer.active .usd-bar { animation: usd-sound 0.4s ease-in-out infinite alternate; }
        #usd-visualizer.active .usd-bar:nth-child(1) { animation-delay: 0.0s; }
        #usd-visualizer.active .usd-bar:nth-child(2) { animation-delay: 0.2s; }
        #usd-visualizer.active .usd-bar:nth-child(3) { animation-delay: 0.1s; }
        #usd-visualizer.active .usd-bar:nth-child(4) { animation-delay: 0.3s; }
        #usd-visualizer.active .usd-bar:nth-child(5) { animation-delay: 0.1s; }
        @keyframes usd-sound { 0% { height: 4px; } 100% { height: 18px; } }
        #usd-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }
        #usd-close-btn:hover { color: #ff4444; }
        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }
        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .usd-link-card {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #111111, #222222);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .usd-link-card:hover {
            background: #D4AF37;
            color: #111111;
            transform: translateY(-2px);
        }
        #usd-interim-text { color: #888; text-align: right; font-style: italic; font-size: 12px; min-height: 16px; margin-bottom: 5px;}
        
        #usd-input-container {
            display: none; 
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        #usd-text-input {
            flex-grow: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }
        #usd-text-input:focus { border-color: #D4AF37; }
        #usd-send-btn {
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            --pulse-max: 20px; 
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
            user-select: none;
        }
        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 var(--pulse-max) rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        #usd-inline-rating {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            text-align: center;
        }
        #usd-rating-title { color: #fff; font-size: 15px; margin-bottom: 12px; font-weight: bold; letter-spacing: 0.5px;}
        .usd-stars { display: flex; justify-content: center; gap: 12px; cursor: pointer; }
        .usd-star { 
            font-size: 28px; 
            color: #333333; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.2s, color 0.2s, text-shadow 0.2s; 
        }
        .usd-star:hover, .usd-star.active { color: #FFD700; transform: scale(1.2); }
        #usd-rating-thanks { display: none; color: #D4AF37; font-size: 13px; margin-top: 12px; font-weight: bold; }
        #usd-end-confirm-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            text-align: center;
            padding: 20px;
        }
        .usd-confirm-title { color: #fff; font-size: 16px; margin-bottom: 20px; font-weight: bold; }
        .usd-confirm-btns { display: flex; gap: 15px; }
        .usd-btn-yes { background: #ff4444; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .usd-btn-no { background: #444; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <audio id="usd-webrtc-player" autoplay playsinline style="display: none;"></audio>
    <audio id="usd-html-player" preload="auto" style="display: none;"></audio>

    <div id="usd-voice-widget">
        <div id="usd-tooltip" onclick="openChat(false)">
            Namaste! Tap here to talk about your new smile!
        </div>

        <div id="usd-chat-container">
            <div id="usd-end-confirm-overlay">
                <div class="usd-confirm-title">Want to end the call?</div>
                <div class="usd-confirm-btns">
                    <button class="usd-btn-yes" onclick="confirmEndChat(true)">Yes</button>
                    <button class="usd-btn-no" onclick="confirmEndChat(false)">No</button>
                </div>
            </div>

            <div id="usd-chat-inner-wrap" style="height: 100%; display: flex; flex-direction: column;">
                <div id="usd-chat-header">
                    <div id="usd-header-left">
                        <img src="https://raw.githubusercontent.com/teeth-vton/sd-voice-backend/dab01d9f2e96be2fcda278af63db62dfef9e1559/Gemini_Generated_Image_67gd1767gd1767gd.png" alt="USD Assistant" width="24" height="24" style="object-fit: contain;">
                        <div id="usd-status-box">Connected 🟢</div>
                    </div>
                    <div id="usd-header-right">
                        <div id="usd-visualizer">
                            <div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div>
                        </div>
                        <button id="usd-close-btn" onclick="closeChatBtnClicked()">✕</button>
                    </div>
                </div>

                <div id="usd-chat-log"></div>
                <div id="usd-interim-text"></div>
                
                <div id="usd-inline-rating">
                    <div id="usd-rating-title">Rate your experience</div>
                    <div class="usd-stars">
                        <span class="usd-star" onclick="submitRating(1)">★</span>
                        <span class="usd-star" onclick="submitRating(2)">★</span>
                        <span class="usd-star" onclick="submitRating(3)">★</span>
                        <span class="usd-star" onclick="submitRating(4)">★</span>
                        <span class="usd-star" onclick="submitRating(5)">★</span>
                    </div>
                    <div id="usd-rating-thanks">Thank you! Transcript sent to our team.</div>
                </div>
            </div>
        </div>
        
        <div id="usd-bubble" onclick="openChat(false)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
        </div>
    </div>

    <script>
        const RENDER_BACKEND_URL = "https://nikjoshi123-usd-voice-backend.hf.space";
        
        let peerConnection = null;
        let dataChannel = null;
        let localStream = null;

        const usdLinks = {
            '[LINK_HOME]': { url: 'https://ultimatesmiledesign.com/', label: '🏠 Go to Home Page' },
            '[LINK_DENTISTS]': { url: 'https://ultimatesmiledesign.com/certified-dentists/', label: '📍 Find Nearest Dentist' },
            '[LINK_VTRYON]': { url: 'https://ultimatesmiledesign.com/virtual-smile-try-on/', label: '✨ Virtual Smile Try-On' }, 
            '[LINK_BLOGS]': { url: 'https://ultimatesmiledesign.com/virtual-smile-try-on/', label: '📰 Read Our Blogs' }, 
            '[LINK_GALLERY]': { url: 'https://ultimatesmiledesign.com/gallery/', label: '🖼️ Check Out Gallery' },
            '[LINK_CONSULT]': { url: 'https://ultimatesmiledesign.com/consult-with-dentist/', label: '👨‍⚕️ Consult Expert Dentist' },
            '[LINK_CONTACT]': { url: 'https://ultimatesmiledesign.com/contact/', label: '📞 Contact Us' },
            '[LINK_CONNECT]': { url: 'https://ultimatesmiledesign.com/dentist-connect/', label: '🤝 Become Certified Dentist' }
        };

        function updateState(newState, statusText = null) {
            const statusBox = document.getElementById('usd-status-box');
            const visualizer = document.getElementById('usd-visualizer');
            if (statusBox && statusText) statusBox.innerText = statusText;
            if (newState === 'speaking') visualizer.classList.add('active');
            else visualizer.classList.remove('active');
        }

        async function openChat() {
            document.getElementById('usd-bubble').style.display = 'none'; 
            document.getElementById('usd-chat-container').style.display = 'flex';
            document.getElementById('usd-tooltip').style.opacity = '0';
            updateState('connecting', "Calling assistant... 🟡");

            // 1. Play the static TTS greeting while WebRTC loads in background
            const greeting = "Namaste! How can we assist you today?";
            logMessage('bot', greeting);
            try {
                const response = await fetch(`${RENDER_BACKEND_URL}/api/tts`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: greeting })
                });
                const data = await response.json();
                const audioEl = document.getElementById('usd-html-player');
                audioEl.src = "data:audio/wav;base64," + data.audioBase64;
                audioEl.play();
            } catch(e) {}

            // 2. Start the Zero-Latency WebRTC Connection
            await startWebRTC();
        }

        async function startWebRTC() {
            try {
                // Get Microphone Access
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Initialize WebRTC Peer Connection
                peerConnection = new RTCPeerConnection();

                // Add microphone audio track to the connection
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // Listen for Gemini's audio track coming back
                peerConnection.ontrack = (event) => {
                    const webrtcPlayer = document.getElementById('usd-webrtc-player');
                    webrtcPlayer.srcObject = event.streams[0];
                    updateState('speaking', "Connected 🟢");
                };

                // Create Data Channel for Text/Tags (Optional depending on Gemini setup)
                dataChannel = peerConnection.createDataChannel("gemini-data");
                dataChannel.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.serverContent && data.serverContent.modelTurn) {
                            const text = data.serverContent.modelTurn.parts[0].text;
                            if (text) logMessage('bot', text);
                        }
                    } catch(e) {}
                };

                // Create SDP Offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                // Send Offer to Backend to handshake with Google
                const response = await fetch(`${RENDER_BACKEND_URL}/api/webrtc/connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sdp: peerConnection.localDescription.sdp })
                });

                const data = await response.json();

                // Accept Gemini's Answer
                await peerConnection.setRemoteDescription(new RTCSessionDescription({
                    type: 'answer',
                    sdp: data.sdp
                }));

                updateState('listening', "Connected 🟢");
                console.log("WebRTC Zero-Latency Stream Active!");

            } catch (error) {
                console.error("WebRTC Error:", error);
                updateState('error', "Connection Failed 🔴");
            }
        }

        function handleLinkClick(tag) {
            window.open(usdLinks[tag].url, '_blank');
        }
        
        function logMessage(sender, text, tag = null) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            msgDiv.innerText = (sender === 'user' ? "You: " : "Assistant: ") + text;
            
            if (tag && usdLinks[tag]) {
                const btn = document.createElement('button');
                btn.className = 'usd-link-card';
                btn.innerText = usdLinks[tag].label;
                btn.onclick = () => handleLinkClick(tag);
                msgDiv.appendChild(btn);
            }
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }

        function closeChatBtnClicked() {
            document.getElementById('usd-end-confirm-overlay').style.display = 'flex';
        }

        function confirmEndChat(isYes) {
            document.getElementById('usd-end-confirm-overlay').style.display = 'none';
            if (isYes) {
                if (peerConnection) peerConnection.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                document.getElementById('usd-chat-container').style.display = 'none';
                document.getElementById('usd-bubble').style.display = 'flex';
            }
        }

        function submitRating(stars) {
            document.getElementById('usd-rating-thanks').style.display = 'block';
            setTimeout(() => { document.getElementById('usd-chat-container').style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
