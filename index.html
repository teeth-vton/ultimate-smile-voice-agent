<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Ultimate Ai</title>
    <style>
        /**
         * ============================================================================
         * ULTIMATE SMILE DESIGN - GLOBAL STYLES
         * ============================================================================
         * The following CSS variables and reset properties define the core aesthetic.
         * By separating properties line-by-line, we ensure maximum readability and
         * easier debugging for future UI enhancements.
         */
        :root {
            --font-Glida-Display: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --usd-gold-primary: #D4AF37;
            --usd-gold-light: #fbefac;
            --usd-gold-dark: #aa803c;
            --usd-bg-dark: #000000;
            --usd-bg-panel: #111111;
        }

        body {
            background-color: var(--usd-bg-dark);
            color: #ffffff;
            margin: 0;
            font-family: var(--font-Glida-Display);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /**
         * ============================================================================
         * VOICE WIDGET CONTAINER
         * ============================================================================
         * The parent container that pins the entire chat experience to the bottom right.
         * We use flex-end to ensure that child elements scale properly against the
         * right edge of the viewport.
         */
        .voice_agent_main {
            height: auto;
            width: auto;
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /**
         * ============================================================================
         * DESKTOP CHAT CONTAINER SIZING & ANIMATION
         * ============================================================================
         */
        .voice_chat_bot_container {
            width: 344px;
            height: 520px;
            background-color: var(--usd-bg-dark);
            box-shadow: 0px 0px 25px 0px rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            position: absolute;
            bottom: 90px;
            right: 0;
            opacity: 0;
            visibility: hidden;
            transform: scale(0.8) translateY(20px);
            transform-origin: bottom right;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            overflow: hidden;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .voice_chat_bot_container.active {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /**
         * ============================================================================
         * CHAT BACKGROUND GLOW EFFECT
         * ============================================================================
         */
        .glow_icon_in_chat_box {
            width: 230px;
            height: 230px;
            position: absolute;
            top: -50px;
            left: -40px;
            pointer-events: none;
            z-index: 1;
        }

        .glow_icon_in_chat_box::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 14px;
            background: linear-gradient(
                270deg,
                #be9644,
                #aa803c,
                #f3dc87,
                #fbefac,
                #f3dc87,
                #aa803c,
                #c49d47
            );
            filter: blur(140px);
            opacity: 0.5;
        }

        /**
         * ============================================================================
         * HEADER STYLES
         * ============================================================================
         */
        .voice_icon_title_and_close_icon_main {
            width: 100%;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 16px;
            box-sizing: border-box;
            margin-top: 15px;
            position: relative;
        }

        .header_title {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .chat_bot_label {
            font-size: 20px;
            letter-spacing: 1.5px;
            font-family: var(--font-Glida-Display);
            font-weight: 600;
            color: var(--usd-gold-primary);
        }

        #usd-status-box {
            color: #ffffff;
            font-size: 10px;
            font-weight: bold;
            margin-top: 3px;
            opacity: 0.6;
        }

        /**
         * ============================================================================
         * TOP ORB CONTAINER (INSIDE CHAT)
         * ============================================================================
         */
        .chat_box_icon_inside_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .chat_box_icon_inside {
            width: 96px;
            height: 96px;
        }

        .chat_box_inside_bot_icon {
            width: 96px;
            height: 96px;
        }

        /**
         * ============================================================================
         * CHAT LOG AREA
         * ============================================================================
         */
        .chat_main_container {
            width: 100%;
            height: 240px;
            margin-top: 10px;
            padding: 16px 16px 8px 16px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            flex-grow: 1;
        }

        .chat_main_container::-webkit-scrollbar {
            display: none;
        }

        /**
         * ============================================================================
         * MESSAGE BUBBLES
         * ============================================================================
         */
        .bot_message {
            position: relative;
            background-color: #080808;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 8px;
            padding: 12px 14px;
            margin-bottom: 16px;
            max-width: 85%;
            color: #ffffff;
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-start;
            margin-left: 8px;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
        }

        .bot_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .bot_message::before {
            content: "";
            position: absolute;
            left: -6.5px;
            bottom: 25%;
            width: 11px;
            height: 11px;
            background-color: #080808;
            border-left: 1px solid rgba(212, 175, 55, 0.25);
            border-top: 1px solid rgba(212, 175, 55, 0.25);
            transform: rotate(-45deg);
            border-top-left-radius: 2px;
        }

        .user_message {
            align-self: flex-end;
            text-align: right;
            color: #e0e0e0;
            font-size: 13px;
            margin-bottom: 16px;
            max-width: 85%;
            line-height: 1.5;
            font-family: inherit;
            letter-spacing: 0.3px;
            box-sizing: border-box;
            background: transparent;
            border: none;
            padding: 0;
        }

        .user_message > p {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /**
         * ============================================================================
         * ACTION LINK CARDS
         * ============================================================================
         */
        .usd-link-card {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #111111, #222222);
            border: 1px solid var(--usd-gold-primary);
            color: var(--usd-gold-primary);
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .usd-link-card:hover {
            background: var(--usd-gold-primary);
            color: #111111;
            transform: translateY(-2px);
        }

        /**
         * ============================================================================
         * CONTROLS FOOTER (VOICE MODE ACTIVE)
         * ============================================================================
         */
        .chat_icon_and_voice_and_close_icon_container_main {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            box-sizing: border-box;
        }

        .chat_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        .voice_icon_main {
            width: 90px;
            height: 90px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice_animation_icon {
            width: 90px;
            height: 90px;
            overflow: visible;
        }

        .close_icon_main {
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close_icon_main:hover {
            transform: scale(1.15);
            opacity: 1;
        }

        /**
         * ============================================================================
         * TEXT INPUT PANEL (TEXT MODE ACTIVE)
         * ============================================================================
         */
        .massge_input_main {
            width: 100%;
            height: 50px;
            padding: 0px 16px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        .input_box_and_icon_main {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
        }

        .chat_input_box {
            width: 85%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 14px;
            font-family: inherit;
        }

        .chat_input_box::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
        }

        .send_button_icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send_button_icon:hover {
            transform: scale(1.1);
        }

        /**
         * ============================================================================
         * MAIN FLOATING BUBBLE
         * ============================================================================
         */
        .voice_chat_bot_icon_container {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            cursor: pointer;
            position: absolute;
            bottom: 0;
            right: 0;
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            box-shadow: 0px 0px 16.7px 0px rgba(255, 255, 255, 0.25);
        }

        .voice_chat_bot_icon_container.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5);
            pointer-events: none;
        }

        .home_screen_bot_icon {
            width: 76px;
            height: 76px;
        }

        /**
         * ============================================================================
         * RATING & DIALOG CONFIRM OVERLAYS
         * ============================================================================
         */
        #usd-inline-rating {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            text-align: center;
            margin-top: auto;
        }

        #usd-rating-title { 
            color: #fff; 
            font-size: 14px; 
            margin-bottom: 10px; 
            font-weight: bold; 
            letter-spacing: 0.5px;
        }

        .usd-stars { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            cursor: pointer; 
        }

        .usd-star { 
            font-size: 24px; 
            color: #333333; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.2s, color 0.2s, text-shadow 0.2s; 
        }

        .usd-star:hover, .usd-star.active { 
            color: var(--usd-gold-primary); 
            transform: scale(1.2);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        #usd-rating-thanks { 
            display: none; 
            color: var(--usd-gold-primary); 
            font-size: 12px; 
            margin-top: 10px; 
            font-weight: bold; 
        }

        #usd-end-confirm-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 14px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            text-align: center;
            padding: 20px;
        }

        .usd-confirm-title { 
            color: #fff; 
            font-size: 15px; 
            margin-bottom: 18px; 
            font-weight: bold; 
        }

        .usd-confirm-btns { 
            display: flex; 
            gap: 15px; 
        }

        .usd-btn-yes { 
            background: #ff4444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        .usd-btn-no { 
            background: #444; 
            color: #fff; 
            border: none; 
            padding: 8px 18px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
        }

        /**
         * ============================================================================
         * VOICE TRIGGER RIPPLE SPEAKING ANIMATIONS
         * ============================================================================
         */
        @keyframes rippleSpeak1 {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 0.45; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes rippleSpeak2 {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 0.25; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        @keyframes rippleSpeak3 {
            0% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.45); opacity: 0.1; }
            100% { transform: scale(1); opacity: 0.4; }
        }

        .voice_icon_main svg .ripple-1,
        .voice_icon_main svg .ripple-2,
        .voice_icon_main svg .ripple-3 {
            transform-origin: 45px 45px;
            transition: transform 0.3s ease;
        }

        .voice_icon_main.is-listening svg .ripple-1,
        .usd-speaking #usd-voice-trigger-btn svg .ripple-1 {
            animation: rippleSpeak1 1.2s infinite ease-in-out;
        }
        .voice_icon_main.is-listening svg .ripple-2,
        .usd-speaking #usd-voice-trigger-btn svg .ripple-2 {
            animation: rippleSpeak2 1.2s infinite ease-in-out 0.2s;
        }
        .voice_icon_main.is-listening svg .ripple-3,
        .usd-speaking #usd-voice-trigger-btn svg .ripple-3 {
            animation: rippleSpeak3 1.2s infinite ease-in-out 0.4s;
        }

        /**
         * ============================================================================
         * PREMIUM GLASSY SIRI ORB SPECIFICATIONS
         * ============================================================================
         */
        .fluid-ribbon {
            transform-origin: 50px 50px;
            transition: transform 0.4s ease-out;
        }

        @keyframes rotateCW {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        @keyframes rotateCCW {
            0% { transform: rotate(360deg) scale(1); }
            50% { transform: rotate(180deg) scale(0.95); }
            100% { transform: rotate(0deg) scale(1); }
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.75; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        .fluid-ribbon.r1 { animation: rotateCW 12s linear infinite; }
        .fluid-ribbon.r2 { animation: rotateCCW 16s linear infinite; }
        .fluid-ribbon.r3 { animation: rotateCW 14s ease-in-out infinite; }
        .fluid-ribbon.r4 { animation: rotateCCW 18s ease-in-out infinite; }
        .orb-core { animation: pulseGlow 4s ease-in-out infinite; transform-origin: 50px 50px; }

        .usd-speaking .fluid-ribbon.r1 { animation: rotateCW 2.2s linear infinite !important; }
        .usd-speaking .fluid-ribbon.r2 { animation: rotateCCW 2.8s linear infinite !important; }
        .usd-speaking .fluid-ribbon.r3 { animation: rotateCW 2.5s ease-in-out infinite !important; }
        .usd-speaking .fluid-ribbon.r4 { animation: rotateCCW 3.2s ease-in-out infinite !important; }
        .usd-speaking .orb-core { animation: pulseGlow 1s ease-in-out infinite !important; }

        .usd-thinking .fluid-ribbon.r1 { animation: rotateCW 7s linear infinite !important; }
        .usd-thinking .fluid-ribbon.r2 { animation: rotateCCW 9s linear infinite !important; }
        .usd-thinking .fluid-ribbon.r3 { animation: rotateCW 8s ease-in-out infinite !important; }
        .usd-thinking .fluid-ribbon.r4 { animation: rotateCCW 10s ease-in-out infinite !important; }
        .usd-thinking .orb-core { animation: pulseGlow 1.8s ease-in-out infinite !important; }

        .usd-listening .fluid-ribbon.r1 { animation: rotateCW 5s linear infinite !important; }
        .usd-listening .fluid-ribbon.r2 { animation: rotateCCW 6.5s linear infinite !important; }
        .usd-listening .fluid-ribbon.r3 { animation: rotateCW 5.8s ease-in-out infinite !important; }
        .usd-listening .fluid-ribbon.r4 { animation: rotateCCW 7.2s ease-in-out infinite !important; }
        .usd-listening .orb-core { animation: pulseGlow 2.5s ease-in-out infinite !important; }

        /**
         * ============================================================================
         * MOBILE RESPONSIVENESS & SCALING
         * ============================================================================
         */
        @media (max-width: 480px) {
            .voice_agent_main { 
                bottom: 20px; 
                right: 20px; 
            }
            .voice_chat_bot_container { 
                width: calc(100vw - 40px); 
                height: 420px; 
                max-height: 80vh;
                bottom: 75px; 
            }
            .chat_main_container { 
                padding: 12px; 
            }
            .home_screen_bot_icon { 
                width: 65px; 
                height: 65px; 
            }
            .voice_chat_bot_icon_container { 
                width: 65px; 
                height: 65px; 
            }
            .chat_box_icon_inside { 
                width: 75px; 
                height: 75px; 
            }
            .chat_box_inside_bot_icon { 
                width: 75px; 
                height: 75px; 
            }
            .voice_icon_main {
                width: 75px;
                height: 75px;
            }
        }
    </style>
</head>
<body>

    <div id="usd-voice-widget" class="voice_agent_main">

        <!-- MAIN CHAT CONTAINER -->
        <div id="usd-chat-container" class="voice_chat_bot_container">
            <!-- GLOWING ORB DECORATION -->
            <div class="glow_icon_in_chat_box"></div>

            <!-- CALL CANCELLATION OVERLAY -->
            <div id="usd-end-confirm-overlay">
                <div class="usd-confirm-title">Want to end the call?</div>
                <div class="usd-confirm-btns">
                    <button class="usd-btn-yes" onclick="confirmEndChat(true)">Yes</button>
                    <button class="usd-btn-no" onclick="confirmEndChat(false)">No</button>
                </div>
            </div>

            <!-- State classes are dynamically toggled on usd-chat-inner-wrap to trigger organic voice morph animations -->
            <div id="usd-chat-inner-wrap" style="height: 100%; display: flex; flex-direction: column; position: relative; z-index: 10;">
                
                <!-- ⚡ FIXED HEADER WITH TEXT MODE CONTROLS ⚡ -->
                <div class="voice_icon_title_and_close_icon_main">
                    
                    <!-- Text Mode Only: Back to Voice Mic Icon (Left) -->
                    <div id="usd-text-mic-btn" class="chat_icon_main" style="position: absolute; left: 16px; display: none;" onclick="toggleChatMode()" title="Switch to Voice Mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                    </div>

                    <div class="header_title">
                        <div class="chat_bot_label">Ultimate Ai</div>
                        <div id="usd-status-box">Connected 🟢</div>
                    </div>

                    <!-- Text Mode Only: Close Chat Icon (Right) -->
                    <div id="usd-text-close-btn" class="close_icon_main" style="position: absolute; right: 16px; display: none;" onclick="closeChatBtnClicked()" title="End Conversation">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </div>
                </div>

                <!-- TOP ANIMATED GLASSY GOLDEN ORB (EXACT SPECIFICATIONS OF ATTACHED IMAGE) -->
                <div class="chat_box_icon_inside_main">
                    <div class="chat_box_icon_inside">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="chat_box_inside_bot_icon" id="usd-glass-orb-svg">
                            <defs>
                                <radialGradient id="orbBg" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#111111" />
                                    <stop offset="65%" stop-color="#1b1b1b" />
                                    <stop offset="85%" stop-color="#101010" />
                                    <stop offset="100%" stop-color="#05050a" />
                                </radialGradient>
                                
                                <linearGradient id="goldRim" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(212, 175, 55, 0.55)" />
                                    <stop offset="50%" stop-color="rgba(255, 248, 220, 0.75)" />
                                    <stop offset="100%" stop-color="rgba(170, 128, 60, 0.55)" />
                                </linearGradient>

                                <linearGradient id="ribbonGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(212, 175, 55, 0.65)" />
                                    <stop offset="100%" stop-color="rgba(170, 128, 60, 0.05)" />
                                </linearGradient>
                                
                                <linearGradient id="ribbonGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="rgba(251, 239, 172, 0.75)" />
                                    <stop offset="100%" stop-color="rgba(196, 157, 71, 0.05)" />
                                </linearGradient>
                                
                                <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
                                    <stop offset="25%" stop-color="#fbefac" stop-opacity="0.8" />
                                    <stop offset="60%" stop-color="#D4AF37" stop-opacity="0.15" />
                                    <stop offset="100%" stop-color="#D4AF37" stop-opacity="0" />
                                </radialGradient>

                                <linearGradient id="reflectGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
                                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
                                </linearGradient>
                            </defs>

                            <circle cx="50" cy="50" r="47" fill="url(#orbBg)" stroke="url(#goldRim)" stroke-width="0.8" />

                            <g id="fluid-group">
                                <path class="fluid-ribbon r1" d="M18 40 C20 22, 60 12, 80 25 C65 37, 37 37, 18 40 Z" fill="url(#ribbonGrad1)" style="mix-blend-mode: screen;" />

        function cleanDisplayText(text = "") {
            let result = String(text || "");
            result = result.replace(new RegExp("\\[(hi|bn|ta|te|mr|gu|kn|ml|pa|or|en)-IN\\]", "gi"), "");
            result = result.replace(new RegExp("<!--[\\s\\S]*?-->", "g"), "");
            result = result.replace(new RegExp("\\s+", "g"), " ");
            return result.trim();
        }

        function updateState(newState, statusText = null) {
            currentAgentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const interimBox = document.getElementById('usd-interim-text');
            const voiceTrigger = document.getElementById('usd-voice-trigger-btn');
            
            const innerWrap = document.getElementById('usd-chat-inner-wrap');
            if (innerWrap) {
                innerWrap.classList.remove('usd-speaking', 'usd-listening', 'usd-thinking');
                if (newState === 'speaking') {
                    innerWrap.classList.add('usd-speaking');
                } else if (newState === 'listening') {
                    innerWrap.classList.add('usd-listening');
                } else if (newState === 'thinking') {
                    innerWrap.classList.add('usd-thinking');
                }
            }

            if (statusBox) {
                if (newState === 'connecting' || newState === 'off') {
                    if (statusText) statusBox.innerText = statusText;
                } else if (isVoiceMode) {
                    statusBox.innerText = "Connected 🟢"; 
                } else {
                    statusBox.innerText = "Chat Mode Active. Type below.";
                }
            }

            if (newState === 'speaking' || newState === 'listening') {
                if (voiceTrigger) voiceTrigger.classList.add('is-listening');
            } else {
                if (voiceTrigger) voiceTrigger.classList.remove('is-listening');
            }

            if (newState === 'listening' && isVoiceMode) {
                isMicSoftwareMuted = false;
                if (window.resetSilenceTimer) window.resetSilenceTimer();
                if (interimBox) {
                    interimBox.innerText = "Listening...";
                    interimBox.style.color = "#D4AF37";
                }
            } else if (newState === 'speaking' && isVoiceMode) {
                isMicSoftwareMuted = false;
                if (window.clearSilenceTimer) window.clearSilenceTimer();
            } else {
                isMicSoftwareMuted = true;
                if (window.clearSilenceTimer) window.clearSilenceTimer();
            }

            if (newState === 'thinking') {
                if (interimBox) {
                    interimBox.innerText = "Answering...";
                    interimBox.style.color = "#ffffff";
                }
            }

            if (!isVoiceMode && interimBox && newState !== 'thinking') {
                interimBox.innerText = "";
            }
        }

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function detectLocalTagFromText(input = '') {
            const text = cleanDisplayText(String(input || "").toLowerCase());
            if (text.includes("end chat") || text.includes("goodbye") || text.includes("bye") || text.includes("take care")) return "[END_CHAT]";
            if (text.includes("virtual smile") || text.includes("try on") || text.includes("try-on") || text.includes("smile try")) return "[LINK_VTRYON]";
            if (text.includes("certified dentist") || text.includes("nearest dentist") || text.includes("find dentist")) return "[LINK_DENTISTS]";
            if (text.includes("consultation") || text.includes("consult") || text.includes("schedule") || text.includes("appointment")) return "[LINK_CONSULT]";
            if (text.includes("contact") || text.includes("reach out") || text.includes("get in touch") || text.includes("call us")) return "[LINK_CONTACT]";
            if (text.includes("dentist connect") || text.includes("become certified dentist") || text.includes("collaborate")) return "[LINK_CONNECT]";
            if (text.includes("gallery") || text.includes("results") || text.includes("before and after")) return "[LINK_GALLERY]";
            return null;
        }

        function getHumanSpeechProfile(dataArray, timeDomainArray, sampleRate = 16000, fftSize = 512) {
            const binHz = sampleRate / fftSize;
            const idx = (hz) => Math.max(0, Math.min(dataArray.length - 1, Math.round(hz / binHz)));
            const speechStart = idx(90);
            const speechEnd = idx(3400);
            const coreStart = idx(180);
            const coreEnd = idx(1200);

            let speechSum = 0, speechCount = 0;
            let coreSum = 0, coreCount = 0;
            let noiseSum = 0, noiseCount = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i];
                if (i >= speechStart && i <= speechEnd) {
                    speechSum += v; speechCount++;
                } else {
                    noiseSum += v; noiseCount++;
                }
                if (i >= coreStart && i <= coreEnd) {
                    coreSum += v; coreCount++;
                }
            }

            let energy = 0;
            for (let i = 0; i < timeDomainArray.length; i++) {
                const centered = (timeDomainArray[i] - 128) / 128;
                energy += centered * centered;
            }
            
            const rms = Math.sqrt(energy / Math.max(1, timeDomainArray.length));
            const speechAvg = speechSum / Math.max(1, speechCount);
            const coreAvg = coreSum / Math.max(1, coreCount);
            const noiseAvg = noiseSum / Math.max(1, noiseCount);
            const speechRatio = speechSum / Math.max(1, (speechSum + noiseSum));
            const coreVsNoise = coreAvg / Math.max(1, noiseAvg);

            const isNearHumanSpeech = rms > 0.008 && speechAvg > 10 && coreAvg > 12 && speechRatio > 0.55 && coreVsNoise > 1.20;       
            return { rms, speechAvg, coreAvg, noiseAvg, speechRatio, coreVsNoise, isNearHumanSpeech };
        }

        function appendLinkButton(targetEl, tag) {
            if (!targetEl || !tag || !usdLinks[tag]) return;
            const btn = document.createElement('button');
            btn.className = 'usd-link-card';
            btn.innerText = usdLinks[tag].label;
            btn.onclick = () => handleLinkClick(tag);
            targetEl.appendChild(btn);
        }

        function saveHistory() {
            sessionStorage.setItem('usd_chat_history', JSON.stringify(chatHistory));
        }

        function addUserHistoryIfNew(text) {
            const clean = cleanDisplayText(text);
            if (!clean) return;
            const last = chatHistory[chatHistory.length - 1];
            if (last && last.role === 'user' && last.parts && last.parts[0] && clean === last.parts[0].text) return;
            chatHistory.push({ role: "user", parts: [{ text: clean }] });
            if (chatHistory.length > 6) chatHistory = chatHistory.slice(-6);
            saveHistory();
        }

        function checkBotFinishedSpeaking() {
            if (isReplyComplete && audioChunkQueue.length === 0 && activeSources.length === 0) {
                isReplyComplete = false;
                nextPlayTime = 0; 
                
                if (activeTag === '[END_CHAT]') {
                    setTimeout(() => closeChat(true), 2000);
                } else {
                    updateState('cooldown');
                    setTimeout(() => {
                        if (currentAgentState === 'cooldown') {
                            updateState('listening');
                        }
                    }, 400); 
                }
                activeTag = null;
            }
        }

        async function playAudioChunk(base64) {
            if (!base64) return;
            updateState('speaking');

            try {
                const binaryString = window.atob(base64);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.playbackRate.value = 1.0; 
                
                if (nextPlayTime < audioCtx.currentTime) {
                    nextPlayTime = audioCtx.currentTime + 0.05; 
                }
                
                source.start(nextPlayTime);
                nextPlayTime += audioBuffer.duration; 
                
                window.activeAudioSourceNode = source;
                activeSources.push(source);
                
                source.onended = () => {
                    activeSources = activeSources.filter(s => s !== source);
                    checkBotFinishedSpeaking(); 
                };
            } catch (e) {
                console.error("Audio Decode error:", e);
            }
        }

        async function processAudioQueue() {
            if (isAudioPlaying) return;
            isAudioPlaying = true;
            while (audioChunkQueue.length > 0) {
                 const chunk = audioChunkQueue.shift(); 
                 await playAudioChunk(chunk.audioBase64);
            }
            isAudioPlaying = false;
            checkBotFinishedSpeaking(); 
            setTimeout(() => {
                if (currentAgentState === 'speaking' && activeSources.length === 0) {
                    isReplyComplete = false;
                    updateState('listening');
                }
            }, 3000);
        }

        function interruptBot() {
            if (!isVoiceMode) return;
            if (socket && socket.readyState === WebSocket.OPEN) {
                try { socket.send(JSON.stringify({ type: 'user_interrupt_barge_in' })); } catch (e) {}
            }
            audioChunkQueue = [];
            isReplyComplete = false; 
            nextPlayTime = 0; 
            interruptRestartHoldUntil = performance.now() + 500; 
            
            liveUserText = "";

            if (window.activeAudioSourceNode) {
                try { window.activeAudioSourceNode.stop(); window.activeAudioSourceNode.disconnect(); } catch(e) {}
            }

            activeSources.forEach(s => { try { s.stop(); s.disconnect(); } catch(e) {} });
            activeSources = [];
            
            activeBotMessageDiv = null;
            activeBotTextSpan = null;
            updateState('listening');
        }

            sessionStorage.setItem('usd_is_voice_mode', isVoiceMode.toString());
        }

                }
                if (container) {
                    container.style.display = 'flex';
                    container.classList.add('active');
                }
                
                document.getElementById('usd-input-container').style.display = 'none';
                document.getElementById('usd-voice-controls-footer').style.display = 'flex';
                document.getElementById('usd-inline-rating').style.display = 'none';
                
                if (isRestore) {
                    chatHistory = JSON.parse(sessionStorage.getItem('usd_chat_history') || '[]');
                    isVoiceMode = sessionStorage.getItem('usd_is_voice_mode') !== 'false';
                    
                    const textControls = document.getElementById('usd-input-container');
                    const voiceFooter = document.getElementById('usd-voice-controls-footer');
                    const inputInner = document.querySelector('.input_box_and_icon_main');
                    const textMicBtn = document.getElementById('usd-text-mic-btn');
                    const textCloseBtn = document.getElementById('usd-text-close-btn');

                    if (isVoiceMode) {
                        if (textControls) textControls.style.display = 'none';
                        if (voiceFooter) voiceFooter.style.display = 'flex';
                        if (textMicBtn) textMicBtn.style.display = "none";
                        if (textCloseBtn) textCloseBtn.style.display = "none";
                    } else {
                        if (textControls) textControls.style.display = 'block';
                        if (inputInner) inputInner.style.display = 'flex';
                        if (voiceFooter) voiceFooter.style.display = 'none';
                        if (textMicBtn) textMicBtn.style.display = "flex";
                        if (textCloseBtn) textCloseBtn.style.display = "flex";
                    }
                    
                    document.getElementById('usd-chat-log').innerHTML = ""; 
                    chatHistory.forEach(turn => {
                        const sender = turn.role === 'model' ? 'bot' : 'user';
                        let cleanText = cleanDisplayText(turn.parts[0].text);
                        let foundTag = null;
                        if (turn.role === 'model') { foundTag = detectLocalTagFromText(cleanText); }
                        logMessage(sender, cleanText, foundTag);
                    });

                    updateState('thinking');
                    await startWebSocket();
                } else {
                    document.getElementById('usd-chat-log').innerHTML = ""; 
                    chatHistory = [];
                    activeBotMessageDiv = null;
                    activeBotTextSpan = null;
                    lastBotMessageDiv = null;
                    
                    updateState('connecting', "Calling assistant... 🟡");
                    await new Promise(resolve => setTimeout(resolve, 1200));
                    
                    updateState('connecting', "Connected 🟢");
                    await new Promise(resolve => setTimeout(resolve, 600));
                    
                    sessionStorage.setItem('usd_chat_active', 'true');
                    await startWebSocket();
                }
            }
        }

        async function startWebSocket() {
            try {
                socket = new WebSocket(WS_URL);

                socket.onopen = async () => {
                    globalStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                    });

                    const streamCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = streamCtx.createMediaStreamSource(globalStream);
                    
                    const bufferSize = 4096;
                    const processor = streamCtx.createScriptProcessor(bufferSize, 1, 1);
                    const analyser = streamCtx.createAnalyser();
                    analyser.fftSize = 512;

                    const silenceGain = streamCtx.createGain();
                    silenceGain.gain.value = 0;

                    source.connect(analyser);
                    source.connect(processor);
                    processor.connect(silenceGain);
                    silenceGain.connect(streamCtx.destination);

                    if (chatHistory.length === 0) {
                        updateState('thinking'); 
                        if (socket.readyState === WebSocket.OPEN) {
                            socket.send(JSON.stringify({ 
                                type: 'text_input', 
                                text: "SYSTEM INSTRUCTION: Start the conversation by warmly saying EXACTLY this specific phrase and absolutely nothing else: 'Namaste! How can we assist you today? Let's start with your beautiful name, what is your name?'", 
                                history: [],
                                isVoiceMode: isVoiceMode 
                            }));
                        }
                    } else {
                        updateState('listening');
                    }

                    let isRecording = false;
                    let shortPauseTimer = null; 
                    let longPauseTimer = null; 
                    let maxRecordingTimer = null;
                    let consecutiveVoiceFrames = 0; 
                    let consecutiveInterruptFrames = 0; 

                    processor.onaudioprocess = (e) => {
                        if (isMicSoftwareMuted) return;
                        
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcm16 = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                        }
                        
                        if (socket && socket.readyState === WebSocket.OPEN && isRecording) {
                            socket.send(pcm16.buffer); 
                        }
                    };

                    function detectVoice() {
                        const isSpeakingNow = currentAgentState === 'speaking';

                        if (isMicSoftwareMuted && !isSpeakingNow) {
                            requestAnimationFrame(detectVoice);
                            return;
                        }

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(dataArray);
                        const timeDataArray = new Uint8Array(analyser.fftSize);
                        analyser.getByteTimeDomainData(timeDataArray);
                        
                        let voiceSum = 0;
                        let voiceBins = 0;
                        for (let i = 10; i < 96; i++) {
                            voiceSum += dataArray[i];
                            voiceBins++;
                        }
                        let humanVolume = voiceSum / Math.max(1, voiceBins);

                        const speechProfile = getHumanSpeechProfile(
                            dataArray, timeDataArray, streamCtx.sampleRate || 16000, analyser.fftSize || 512
                        );

                        if (isSpeakingNow) {
                            const isForegroundVoice = speechProfile.isNearHumanSpeech && 
                                                      humanVolume > 15 && 
                                                      speechProfile.rms > 0.01 &&
                                                      speechProfile.coreVsNoise > 1.5 &&
                                                      speechProfile.speechRatio > 0.60;
                                                      
                            if (isForegroundVoice) {
                                consecutiveInterruptFrames++;
                                if (consecutiveInterruptFrames > 25) {
                                    interruptBot();
                                    consecutiveInterruptFrames = 0;
                                }
                            } else {
                                consecutiveInterruptFrames = Math.max(0, consecutiveInterruptFrames - 1);
                            }
                            requestAnimationFrame(detectVoice);
                            return;
                        }

                        if (currentAgentState === 'listening' && isVoiceMode) {
                            if (humanVolume > 10 && window.resetSilenceTimer) {
                                window.resetSilenceTimer();
                            }

                            const volumeIsGood = humanVolume > 10; 
                            const canStartRecording = speechProfile.isNearHumanSpeech && volumeIsGood; 

                            if (canStartRecording) {
                                consecutiveVoiceFrames++;
                            } else {
                                consecutiveVoiceFrames = 0;
                            }

                            if (consecutiveVoiceFrames > 8) { 
                                if (!isRecording) {
                                    isRecording = true;
                                    liveUserText = ""; 
                                    updateState('listening'); 
                                    
                                    if (socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'start_of_speech' }));
                                    }
                                    
                                    maxRecordingTimer = setTimeout(() => {
                                        if (isRecording) {
                                            isRecording = false;
                                            updateState('thinking');
                                            if (socket.readyState === WebSocket.OPEN) {
                                                socket.send(JSON.stringify({ 
                                                    type: 'process_final', history: chatHistory, isVoiceMode: isVoiceMode, nativeTranscript: liveUserText 
                                                }));
                                            }
                                            liveUserText = ""; 
                                            const interimBox = document.getElementById('usd-interim-text');
                                            if (interimBox) interimBox.innerText = "Answering...";
                                        }
                                    }, 20000); 
                                }
                                
                                clearTimeout(shortPauseTimer);
                                clearTimeout(longPauseTimer);
                                
                                shortPauseTimer = setTimeout(() => {
                                    if (isRecording && socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'process_interim' }));
                                    }
                                }, 800); 

                                longPauseTimer = setTimeout(() => {
                                    if (isRecording) {
                                        isRecording = false;
                                        clearTimeout(maxRecordingTimer);
                                        updateState('thinking');
                                        
                                        if (socket.readyState === WebSocket.OPEN) {
                                            socket.send(JSON.stringify({ 
                                                type: 'process_final', history: chatHistory, isVoiceMode: isVoiceMode, nativeTranscript: liveUserText 
                                            }));
                                        }
                                        
                                        liveUserText = ""; 
                                        const interimBox = document.getElementById('usd-interim-text');
                                        if (interimBox) interimBox.innerText = "Answering...";
                                    }
                                }, 2500); 
                            }
                        }
                        requestAnimationFrame(detectVoice);
                    }
                    
                    detectVoice();
                };

                socket.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'bot_interrupted') {
                        audioChunkQueue = [];
                        if (window.activeAudioSourceNode) {
                            try { window.activeAudioSourceNode.stop(); window.activeAudioSourceNode.disconnect(); } catch (e) {}
                            window.activeAudioSourceNode = null;
                        }
                        activeSources.forEach(s => { try { s.stop(); s.disconnect(); } catch(e) {} });
                        activeSources = [];
                        isAudioPlaying = false;
                        isReplyComplete = false;
                        nextPlayTime = 0;
                        
                        liveUserText = ""; activeBotMessageDiv = null; activeBotTextSpan = null; 
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) { interimBox.innerText = "Listening..."; interimBox.style.color = "#D4AF37"; }
                        
                        updateState('listening');
                        return; 
                    }
                    else if (data.type === 'idle' || data.type === 'error') {
                        if (data.type === 'error') console.error("Backend Error:", data.error);
                        liveUserText = ""; 
                        
                        isReplyComplete = false;
                        audioChunkQueue = [];

                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) interimBox.innerText = "";
                        updateState('listening');
                    }
                    else if (data.type === 'user_spoken_text') {
                        const cleanUserText = cleanDisplayText(data.text || "");
                        if (cleanUserText) {
                            const last = chatHistory[chatHistory.length - 1];
                            const alreadyInHistory = last && last.role === 'user' && last.parts && last.parts[0] && cleanUserText === last.parts[0].text;
                            if (!alreadyInHistory) {
                                logMessage('user', cleanUserText);
                                addUserHistoryIfNew(cleanUserText);
                            }
                            liveUserText = ""; 
                            const interimBox = document.getElementById('usd-interim-text');
                            if (interimBox && interimBox.innerText.includes("You:")) {
                                interimBox.innerText = "Answering...";
                                interimBox.style.color = "#ffffff";
                            }
                        }
                    }
                    else if (data.type === 'interim_transcript') {
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox && data.text) {
                            interimBox.innerText = "You: " + data.text + " ...";
                            interimBox.style.color = "#D4AF37";
                        }
                    }
                    else if (data.type === 'text_stream') {
                        const streamedText = cleanDisplayText(data.text || "");
                        if (!streamedText) return; 

                        if (!activeBotMessageDiv) {
                            activeBotMessageDiv = logMessage('bot', streamedText);
                            activeBotTextSpan = activeBotMessageDiv.querySelector('.usd-msg-text');
                        } else if (activeBotTextSpan) {
                            activeBotTextSpan.innerText = streamedText;
                        }

                        const previewTag = data.tag || detectLocalTagFromText(streamedText);
                        if (previewTag && usdLinks[previewTag]) {
                            if (!activeBotMessageDiv.querySelector('.usd-link-card')) {
                                appendLinkButton(activeBotMessageDiv, previewTag);
                            }
                        }

                        const log = document.getElementById('usd-chat-log');
                        log.scrollTop = log.scrollHeight;
                    }
                    else if (data.type === 'audio_chunk') {
                        if (isVoiceMode) {
                            audioChunkQueue.push(data);
                            processAudioQueue();
                        }
                    }
                    else if (data.type === 'reply_complete') {
                        isReplyComplete = true; 
                        liveUserText = ""; 
                        const interimBox = document.getElementById('usd-interim-text');
                        if (interimBox) { interimBox.innerText = ""; }

                        const botTarget = activeBotMessageDiv; 
                        activeBotMessageDiv = null;
                        activeBotTextSpan = null;

                        const finalText = cleanDisplayText(data.botText || "").trim();
                        const finalTag = data.tag || detectLocalTagFromText(finalText) || detectLocalTagFromText(data.userText || "");

                        if (finalText) {
                            if (botTarget) {
                                const span = botTarget.querySelector('.usd-msg-text');
                                if (span) span.innerText = finalText;
                            } else {
                                lastBotMessageDiv = logMessage('bot', finalText);
                            }

                            const last = chatHistory[chatHistory.length - 1];
                            if (!(last && last.role === 'model' && last.parts && last.parts[0] && last.parts[0].text === finalText)) {
                                chatHistory.push({ role: "model", parts: [{ text: finalText }] });
                                if (chatHistory.length > 6) chatHistory = chatHistory.slice(-6);
                                saveHistory();
                            }
                        } else if (botTarget) {
                            botTarget.remove();
                        }

                        activeTag = finalTag;
                        
                        const finalBotTarget = botTarget || lastBotMessageDiv;
                        if (activeTag && usdLinks[activeTag] && finalBotTarget) {
                            if (!finalBotTarget.querySelector('.usd-link-card')) {
                                appendLinkButton(finalBotTarget, activeTag);
                            }
                            const log = document.getElementById('usd-chat-log');
                            log.scrollTop = log.scrollHeight;
                        }

                        if (!isVoiceMode) {
                            updateState('listening');
                            if (activeTag === '[END_CHAT]') setTimeout(() => closeChat(true), 2000);
                        } else {
                            checkBotFinishedSpeaking(); 
                        }
                    }
                };
                socket.onerror = () => { updateState('listening'); };
        } catch (err) {
            updateState('listening');
        }
    }

    function closeChatBtnClicked() {
        document.getElementById('usd-end-confirm-overlay').style.display = 'flex';
    }

    async function confirmEndChat(isYes) {
        document.getElementById('usd-end-confirm-overlay').style.display = 'none';
        if (isYes) {
            updateState('thinking');
            interruptBot();
            
            const goodbyeText = "Thanks for talking with Ultimate Smile Design. Please feel free to reach out to us at our contact page.";
            logMessage('bot', goodbyeText);
            
            if (isVoiceMode) {
                try {
                    const response = await fetch(`${RENDER_BACKEND_URL}/api/tts`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: goodbyeText, lang: 'en-IN' })
                    });
                    const data = await response.json();
                    
                    isReplyComplete = true; 
                    audioChunkQueue.push(data);
                    processAudioQueue();
                    
                    setTimeout(() => closeChat(true), 4000);
                } catch(e) { closeChat(true); }
            } else {
                setTimeout(() => closeChat(true), 2000);
            }
        }
    }

    function closeChat(showRating = false) {
        updateState('off');
        interruptBot();
        releaseWakeLock(); 
        if (socket) socket.close();
        if (globalStream) globalStream.getTracks().forEach(track => track.stop());
        
        sessionStorage.removeItem('usd_chat_active');
        sessionStorage.removeItem('usd_chat_history');
        
        const bubble = document.getElementById('usd-bubble');
        const container = document.getElementById('usd-chat-container');

        if (showRating) {
            document.getElementById('usd-input-container').style.display = 'none';
            document.getElementById('usd-voice-controls-footer').style.display = 'none';
            document.getElementById('usd-inline-rating').style.display = 'block';
            logMessage('system', 'The chat has ended. Please rate your experience below.');
        } else {
            if (container) {
                container.style.display = 'none';
                container.classList.remove('active');
            }
            if (bubble) {
                bubble.style.display = 'flex'; 
                bubble.classList.remove('hidden');
            }
        }
    }

    async function submitRating(stars) {
        const starElements = document.querySelectorAll('.usd-star');
        starElements.forEach((s, index) => {
            s.style.color = index < stars ? '#FFD700' : '#444';
            s.style.textShadow = index < stars ? '0 0 10px rgba(255, 215, 0, 0.6)' : '0 2px 4px rgba(0,0,0,0.5)';
        });
        document.getElementById('usd-rating-thanks').style.display = 'block';

        try {
            let transcript = "No chat history recorded.";
            const allMessages = document.querySelectorAll('#usd-chat-log .usd-msg-text');
            if (allMessages.length > 0) {
                transcript = Array.from(allMessages).map(msg => msg.innerText).join('\n\n');
            }
            await fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({ 
                    access_key: "c1a373a7-407e-47f4-8403-be692c2f3eff", 
                    subject: `🌟 New USD Voice Agent Rating: ${stars}/5 Stars`, 
                    from_name: "Ultimate Smile Voice Agent", 
                    email: "noreply@ultimatesmiledesign.com",
                    message: `Transcript:\n\n${transcript}` 
                })
            });
        } catch(e) { }
        setTimeout(() => { closeChat(false); }, 3000);
    }

    async function submitTextMessage() {
        const inputEl = document.getElementById('usd-text-input');
        const userText = cleanDisplayText(inputEl.value.trim());
        if (!userText || currentAgentState === 'thinking' || currentAgentState === 'connecting') return;

        inputEl.value = ''; 
        interruptBot();

        updateState('thinking');
        
        logMessage('user', userText);
        addUserHistoryIfNew(userText);

        if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ 
                type: 'text_input', 
                text: userText, 
                history: chatHistory,
                isVoiceMode: isVoiceMode 
            }));
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault(); 
            submitTextMessage();
        }
    }

    async function handleLinkClick(tag) {
        const linkInfo = usdLinks[tag];
        if (!linkInfo) return;
        
        logMessage('bot', "Redirecting you now...");
        chatHistory.push({ role: "model", parts: [{ text: "Redirecting you now..." }] });
        if (chatHistory.length > 6) chatHistory = chatHistory.slice(-6);
        saveHistory();

        window.open(linkInfo.url, '_blank');
        updateState('listening');
    }
    
    function logMessage(sender, text, tag = null) {
        const log = document.getElementById('usd-chat-log');
        const msgDiv = document.createElement('div');
        
        if (sender === 'user') {
            msgDiv.className = 'user_message';
        } else if (sender === 'bot') {
            msgDiv.className = 'bot_message';
        } else {
            msgDiv.className = 'msg msg-system';
        }
        
        const p = document.createElement('p');
        p.className = 'usd-msg-text';
        
        if (sender === 'user') p.innerText = text;
        else if (sender === 'bot') p.innerText = text;
        else p.innerText = text; 
        
        msgDiv.appendChild(p);

        if (tag && usdLinks[tag]) {
            const btn = document.createElement('button');
            btn.className = 'usd-link-card';
            btn.innerText = usdLinks[tag].label;
            btn.onclick = () => handleLinkClick(tag);
            msgDiv.appendChild(btn);
        }

        log.appendChild(msgDiv);
        log.scrollTop = log.scrollHeight;

        if (sender === 'bot') {
            lastBotMessageDiv = msgDiv;
        }

        return msgDiv;
    }

    window.openChat = openChat;
    window.closeChat = closeChat;
    window.confirmEndChat = confirmEndChat;
    window.toggleChatMode = toggleChatMode;
    window.closeChatBtnClicked = closeChatBtnClicked;
    window.submitTextMessage = submitTextMessage;
    window.submitRating = submitRating;
    window.handleKeyPress = handleKeyPress;
    window.handleLinkClick = handleLinkClick;
    </script>
</body>
