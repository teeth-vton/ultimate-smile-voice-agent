<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #usd-tooltip {
            background: #D4AF37;
            color: #111;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            position: relative;
            cursor: pointer;
            display: block; 
        }
        
        #usd-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #D4AF37 transparent transparent transparent;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        #usd-chat-container {
            width: 320px;
            max-height: 340px;
            background-color: #111111;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
        }

        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }

        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: left; font-size: 11px; background: rgba(255,68,68,0.1); padding: 6px; border-radius: 5px; margin-top: 5px; }
        .msg-system { color: #888; font-style: italic; text-align: center; font-size: 11px; }
        
        #usd-interim-text { color: #888; text-align: right; font-style: italic; font-size: 12px; min-height: 16px; }

        #usd-status-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 8px;
            font-weight: bold;
        }

        #usd-input-container {
            display: flex;
            border-top: 1px solid #222;
            padding-top: 8px;
            margin-top: 5px;
        }

        #usd-text-input {
            flex-grow: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }

        #usd-text-input:focus { border-color: #D4AF37; }

        #usd-send-btn {
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        #usd-send-btn:hover { background: #FFF8DC; }

        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
            user-select: none;
        }

        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon { color: #111111; font-weight: bold; font-size: 24px; }

        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }
        
        .usd-listening {
            box-shadow: 0 0 15px 5px rgba(0, 255, 128, 0.4) !important; 
        }

        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }

        /* ========================================= */
        /* NEW: MOBILE RESPONSIVE RULES              */
        /* ========================================= */
        @media (max-width: 480px) {
            #usd-voice-widget {
                bottom: 15px;
                right: 15px;
            }
            #usd-bubble {
                width: 60px; /* Smaller bubble for mobile */
                height: 60px;
            }
            #usd-bubble-icon {
                font-size: 20px;
            }
            #usd-chat-container {
                width: calc(100vw - 30px); /* Adjusts perfectly to screen width */
                padding: 12px;
                margin-bottom: 10px;
                max-width: 320px;
            }
            #usd-tooltip {
                font-size: 12px; /* Smaller text */
                padding: 8px 12px;
                margin-bottom: 10px;
            }
            #usd-tooltip::after {
                right: 20px; /* Align arrow to smaller bubble */
            }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <script>
        window.usdUserName = "Guest"; // Your VTO will update this to "Rahul", "Priya", etc.
    </script>

    <div id="usd-voice-widget">
        <div id="usd-tooltip" onclick="handleBubbleClick()">
            Namaste! Tap here to talk about your new smile!
        </div>

        <div id="usd-chat-container">
            <div id="usd-chat-log"></div>
            <div id="usd-interim-text"></div>
            
            <div id="usd-input-container">
                <input type="text" id="usd-text-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                <button type="button" id="usd-send-btn" onclick="submitTextMessage()">Send</button>
            </div>

            <div id="usd-status-box">Initializing...</div>
        </div>
        
        <div id="usd-bubble" onclick="handleBubbleClick()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        let agentState = 'off'; 
        let chatHistory = [];
        let recognition;
        let audioPlayer;
        let speechTimeout;
        let userSpeechBuffer = ''; 

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = true;
            // FIXED: Set to hi-IN to perfectly capture Hindi pronunciation and text
            recognition.lang = 'hi-IN'; 
        }

        window.onload = () => {
            audioPlayer = document.getElementById('usd-html-player');
            setupRecognitionCallbacks();
            
            const tooltip = document.getElementById('usd-tooltip');
            if(window.usdUserName !== "Guest") {
                tooltip.innerText = `Namaste ${window.usdUserName}! Tap here to talk about your new smile!`;
            }
        };

        async function handleBubbleClick() {
            const container = document.getElementById('usd-chat-container');
            const tooltip = document.getElementById('usd-tooltip');
            
            if (agentState === 'off') {
                container.style.display = 'flex';
                tooltip.style.display = 'none'; 
                
                audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD";
                audioPlayer.play().catch(() => {});

                updateState('connecting', "Calling assistant... 🟡");
                await new Promise(resolve => setTimeout(resolve, 3000));

                updateState('connecting', "Connected 🟢");
                await new Promise(resolve => setTimeout(resolve, 1500));

                updateState('speaking', "Assistant is speaking...");
                const actualName = window.usdUserName !== "Guest" ? window.usdUserName : "";
                const greeting = `Namaste ${actualName}! How did you like our virtual try-on?`;
                
                logMessage('bot', greeting);
                await useBrowserTTS(greeting); 
                
                updateState('thinking', "Please allow microphone access...");
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    updateState('off', "Microphone access denied. You can still type.");
                    return;
                }

                updateState('listening', "Listening...");
                
            } else {
                updateState('off', "");
                if(recognition) recognition.stop();
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                container.style.display = 'none';
            }
        }

        async function submitTextMessage() {
            const inputEl = document.getElementById('usd-text-input');
            const userText = inputEl.value.trim();
            
            if (!userText || agentState === 'thinking' || agentState === 'connecting') return;

            inputEl.value = ''; 
            
            clearTimeout(speechTimeout);
            userSpeechBuffer = '';

            try { recognition.stop(); } catch(e) {} 
            audioPlayer.pause(); 

            logMessage('user', userText);
            updateState('thinking', "Assistant is replying...");
            
            try {
                const botReply = await processTurnThroughBackend(userText);
                if (agentState === 'off') return; 
                
                logMessage('bot', botReply);
            } catch (error) {
                logMessage('error', `Error: ${error.message}`);
                updateState('listening', "Listening...");
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                // FIXED: Prevents the mobile keyboard from accidentally refreshing the page!
                event.preventDefault(); 
                submitTextMessage();
            }
        }

        function updateState(newState, statusText) {
            agentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            const interimBox = document.getElementById('usd-interim-text');
            
            if (statusBox) statusBox.innerText = statusText;
            if (bubble) bubble.className = ''; 
            if (interimBox) interimBox.innerText = ''; 
            
            if (newState === 'listening') {
                bubble.classList.add('usd-listening');
                try { recognition.start(); } catch(e) {}
            } 
            else if (newState === 'thinking') {
                bubble.classList.add('usd-speaking'); 
                try { recognition.stop(); } catch(e) {}
            }
            else if (newState === 'connecting') {
                bubble.classList.add('usd-speaking'); 
                try { recognition.stop(); } catch(e) {}
            }
            else if (newState === 'speaking') {
                bubble.classList.add('usd-speaking');
                try { recognition.start(); } catch(e) {}
            }
        }

        function setupRecognitionCallbacks() {
            if (!recognition) return;

            recognition.onresult = async (event) => {
                if (agentState === 'thinking' || agentState === 'off' || agentState === 'connecting') return;
                
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                document.getElementById('usd-interim-text').innerText = userSpeechBuffer + " " + interimTranscript;

                if (interimTranscript.length > 3 && agentState === 'speaking') {
                    audioPlayer.pause();
                    window.speechSynthesis.cancel();
                    userSpeechBuffer = ''; 
                    logMessage('system', 'You interrupted the assistant.');
                    updateState('listening', "Interrupted! Listening...");
                }

                if (finalTranscript.trim()) {
                    userSpeechBuffer += (userSpeechBuffer ? " " : "") + finalTranscript.trim();
                    document.getElementById('usd-interim-text').innerText = userSpeechBuffer;

                    clearTimeout(speechTimeout); 
                    
                    speechTimeout = setTimeout(async () => {
                        const userText = userSpeechBuffer.trim();
                        userSpeechBuffer = ''; 
                        
                        if (userText.length < 2) return; 

                        audioPlayer.pause();
                        window.speechSynthesis.cancel();

                        logMessage('user', userText);
                        document.getElementById('usd-interim-text').innerText = "";
                        updateState('thinking', "Assistant is replying...");
                        
                        try {
                            const botReply = await processTurnThroughBackend(userText);
                            if (agentState === 'off') return; 
                            logMessage('bot', botReply);
                        } catch (error) {
                            logMessage('error', `Error: ${error.message}`);
                            if (agentState !== 'off') {
                                updateState('listening', "Listening...");
                            }
                        }
                    }, 1500); 
                }
            };

            recognition.onerror = (event) => {
                if (agentState === 'listening' && event.error === 'no-speech') {
                    try { recognition.stop(); } catch(e){}
                    setTimeout(() => {
                        if (agentState === 'listening' || agentState === 'speaking') {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 200);
                }
            };

            recognition.onend = () => {
                if (agentState === 'listening' || agentState === 'speaking') {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        async function processTurnThroughBackend(userText) {
            const BACKEND_URL = "https://sd-voice-backend.vercel.app/api/chat"; 
            
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: userText, history: chatHistory })
            });
            
            if (!response.ok) throw new Error("Vercel Server Unreachable.");
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            chatHistory.push({ role: "model", parts: [{ text: data.replyText }] });

            updateState('speaking', "Assistant is speaking...");
            audioPlayer.src = "data:audio/wav;base64," + data.audioBase64;
            
            await new Promise((resolve) => {
                audioPlayer.onended = () => {
                    if(agentState === 'speaking') updateState('listening', "Listening...");
                    resolve();
                };
                audioPlayer.onerror = resolve;
                audioPlayer.play().catch(() => resolve());
            });

            return data.replyText;
        }

        function useBrowserTTS(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-IN'; 
                utterance.rate = 1.0;
                utterance.onend = resolve;
                utterance.onerror = resolve;
                window.speechSynthesis.speak(utterance);
            });
        }

        function logMessage(sender, text) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            
            if (sender === 'user') msgDiv.innerText = "You: " + text;
            else if (sender === 'bot') msgDiv.innerText = "Assistant: " + text;
            else msgDiv.innerText = text; 
            
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
