<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Floating Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #usd-status-box {
            background-color: #111111;
            color: #D4AF37;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #D4AF37;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
        }
        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
        }
        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon {
            color: #111111;
            font-weight: bold;
            font-size: 24px;
            line-height: 1;
        }
        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }
        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="usd-voice-widget">
        <div id="usd-status-box">Click to speak...</div>
        <div id="usd-bubble" onclick="startVoiceAgent()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // API Keys Configuration
        const SARVAM_API_KEY = "sk_wb30zmo4_NunBvEprJaP7zKBmgZuJG0N7"; 
        const GEMINI_API_KEY = "AQ.Ab8RN6KBVrNFbrrUh4N_A6MhqpwjbtB3IILUHM0ZWACu-LCM9A"; 
        
        let isProcessing = false;
        let chatHistory = [];
        
        // Initialize Browser Speech Recognition (The "Ears")
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'hi-IN'; // Optimized for Hindi/English code-mixing

        async function startVoiceAgent() {
            if (isProcessing) return;
            isProcessing = true;
            
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            statusBox.style.display = 'block';
            bubble.classList.add('usd-speaking');
            
            // 1. Initial Greeting
            statusBox.innerText = "Speaking...";
            const greeting = "Namaste! Aapko hamara virtual try-on kaisa laga? What are your thoughts on it?";
            
            // Add greeting to history so Gemini remembers saying it
            chatHistory.push({ role: "model", parts: [{ text: greeting }] });
            
            await speakWithSarvam(greeting);
            
            // 2. Start Listening automatically after greeting
            startListening();
        }

        function startListening() {
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            bubble.classList.remove('usd-speaking');
            statusBox.innerText = "Listening... Speak now!";
            recognition.start();
        }

        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            statusBox.innerText = "Thinking...";
            bubble.classList.add('usd-speaking'); 
            
            try {
                // 3. Send text to Gemini Brain
                const botReply = await askGemini(userText);
                
                // 4. Send response text to Sarvam Voice
                statusBox.innerText = "Speaking...";
                await speakWithSarvam(botReply);
                
            } catch (error) {
                console.error("Pipeline Error:", error);
                statusBox.innerText = "Network Error.";
            }
            
            // 5. Loop back to listening for the next turn
            startListening();
        };

        recognition.onerror = (e) => {
            document.getElementById('usd-status-box').innerText = "Mic paused. Click bubble to speak.";
            document.getElementById('usd-bubble').classList.remove('usd-speaking');
            isProcessing = false;
        };
        
        recognition.onend = () => {
             if(document.getElementById('usd-status-box').innerText === "Listening... Speak now!") {
                 document.getElementById('usd-status-box').innerText = "Mic timed out. Click to restart.";
                 isProcessing = false;
             }
        }

        async function askGemini(userText) {
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{ text: "You are the official voice assistant for Ultimate Smile Design. Reply in 1 or 2 short sentences. Smoothly mix Hindi and English (Hinglish). Answer ONLY dental or smile design questions. If off-topic, say EXACTLY: 'Sir/Mam, hum yaha sirf dental aur smile design se related answers dete hai.'" }]
                    },
                    contents: chatHistory
                })
            });
            
            const data = await response.json();
            const botReply = data.candidates[0].content.parts[0].text;
            chatHistory.push({ role: "model", parts: [{ text: botReply }] });
            return botReply;
        }

        async function speakWithSarvam(text) {
            const response = await fetch('https://api.sarvam.ai/text-to-speech', {
                method: 'POST',
                headers: {
                    'api-subscription-key': sk_wb30zmo4_NunBvEprJaP7zKBmgZuJG0N7,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    inputs: [text],
                    target_language_code: "hi-IN", // Tells Sarvam to expect Hinglish/Hindi
                    speaker: "meera",            // Authentic Indian female voice
                    model: "bulbul:v3"           // Sarvam's fastest flagship voice model
                })
            });
            
            const data = await response.json();
            if(data.audios && data.audios[0]) {
                const audio = new Audio("data:audio/wav;base64," + data.audios[0]);
                await new Promise(resolve => {
                    audio.onended = resolve;
                    audio.play();
                });
            }
        }
    </script>
</body>
</html>
