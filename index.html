<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #usd-chat-container {
            width: 300px;
            max-height: 250px;
            background-color: #111111;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
        }

        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 180px;
            padding-right: 5px;
        }

        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: center; font-weight: bold; } /* Added Red Error Text */

        #usd-status-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 8px;
        }

        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
        }

        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon { color: #111111; font-weight: bold; font-size: 24px; }

        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }

        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <div id="usd-voice-widget">
        <div id="usd-chat-container">
            <div id="usd-chat-log"></div>
            <div id="usd-status-box">Initializing...</div>
        </div>
        
        <div id="usd-bubble" onclick="toggleVoiceAgent()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // PASTE YOUR BRAND NEW KEYS HERE
        const SARVAM_API_KEY = "sk_1g2qtc7g_Lme6F0ta58Wv4SooxWVfUCfa"; 
        const GEMINI_API_KEY = "AQ.Ab8RN6KYQAbLDe5ZFVKXCWGahcU_CuWF2Rqo4-13JP_iA7JUhg"; 
        
        let isAgentRunning = false;
        let chatHistory = [];
        let recognition;
        let audioPlayer;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'hi-IN'; 
        }

        window.onload = () => {
            audioPlayer = document.getElementById('usd-html-player');
            setupRecognitionCallbacks();
        };

        async function toggleVoiceAgent() {
            const container = document.getElementById('usd-chat-container');
            const bubble = document.getElementById('usd-bubble');
            const statusBox = document.getElementById('usd-status-box');

            if (isAgentRunning) {
                isAgentRunning = false;
                if(recognition) recognition.abort();
                audioPlayer.pause();
                bubble.classList.remove('usd-speaking');
                container.style.display = 'none';
                return;
            }

            isAgentRunning = true;
            container.style.display = 'flex';
            bubble.classList.add('usd-speaking');
            statusBox.innerText = "Speaking greeting...";
            
            // Bypass Browser Security
            audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD";
            audioPlayer.play().catch(() => {});

            const greeting = "Namaste! Aapko hamara virtual try-on kaisa laga? What are your thoughts on it?";
            logMessage('bot', greeting);
            
            try {
                await speakWithSarvam(greeting);
                startListeningLoop();
            } catch (err) {
                logMessage('error', 'Initial Audio Failed. Did you paste the API keys?');
                statusBox.innerText = "Agent halted.";
                bubble.classList.remove('usd-speaking');
                isAgentRunning = false;
            }
        }

        function startListeningLoop() {
            if (!isAgentRunning || !recognition) return;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            bubble.classList.remove('usd-speaking');
            statusBox.innerText = "Listening... Speak now!";
            
            try {
                recognition.start();
            } catch(e) {}
        }

        function setupRecognitionCallbacks() {
            if (!recognition) return;

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                const statusBox = document.getElementById('usd-status-box');
                const bubble = document.getElementById('usd-bubble');
                
                logMessage('user', userText);
                statusBox.innerText = "Thinking...";
                bubble.classList.add('usd-speaking'); 
                
                try {
                    const botReply = await askGeminiBrain(userText);
                    logMessage('bot', botReply);
                    statusBox.innerText = "Speaking...";
                    
                    await speakWithSarvam(botReply);
                    
                    // ONLY loop if everything succeeds
                    startListeningLoop();

                } catch (error) {
                    console.error("Pipeline Error:", error);
                    // PRINT EXACT ERROR TO THE SCREEN AND STOP LOOPING
                    logMessage('error', `SYSTEM HALT: ${error.message}`);
                    statusBox.innerText = "Agent Stopped due to error.";
                    bubble.classList.remove('usd-speaking');
                    isAgentRunning = false; // Prevents the mic from reopening
                }
            };

            recognition.onerror = (event) => {
                if (isAgentRunning && event.error === 'no-speech') {
                    startListeningLoop();
                } else if (isAgentRunning) {
                    logMessage('error', `Mic Error: ${event.error}`);
                }
            };

            recognition.onend = () => {
                if (isAgentRunning && document.getElementById('usd-status-box').innerText === "Listening... Speak now!") {
                    startListeningLoop();
                }
            };
        }

        async function askGeminiBrain(userText) {
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    systemInstruction: {
                        parts: [{ text: "You are the official voice assistant for Ultimate Smile Design. Reply in 1 or 2 short sentences max. Smoothly mix Hindi and English (Hinglish). Answer ONLY dental or smile design questions. If off-topic, say EXACTLY: 'Sir/Mam, hum yaha sirf dental aur smile design se related answers dete hai.'" }]
                    },
                    contents: chatHistory
                })
            });
            
            if (!response.ok) {
                throw new Error(`Gemini Server rejected key. Code: ${response.status}`);
            }

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const botReply = data.candidates[0].content.parts[0].text;
                chatHistory.push({ role: "model", parts: [{ text: botReply }] });
                return botReply;
            } else {
                throw new Error("Invalid response format from Gemini.");
            }
        }

        async function speakWithSarvam(text) {
            const response = await fetch('https://api.sarvam.ai/text-to-speech', {
                method: 'POST',
                headers: {
                    'api-subscription-key': SARVAM_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    inputs: [text],
                    target_language_code: "hi-IN",
                    speaker: "meera",
                    pitch: 0,
                    pace: 1.0,
                    loudness: 1.5,
                    speech_sample_rate: 16000,
                    enable_preprocessing: true,
                    model: "builtin/speech"
                })
            });
            
            if (!response.ok) {
                throw new Error(`Sarvam TTS rejected audio payload. Code: ${response.status}`);
            }

            const data = await response.json();
            if (data.audios && data.audios[0]) {
                audioPlayer.src = "data:audio/wav;base64," + data.audios[0];
                
                return new Promise((resolve, reject) => {
                    audioPlayer.onended = resolve;
                    audioPlayer.onerror = () => reject(new Error("Browser blocked audio playback."));
                    audioPlayer.play().catch((err) => reject(new Error("Audio Playback Error: " + err.message)));
                });
            } else {
                throw new Error("Sarvam returned no audio file.");
            }
        }

        function logMessage(sender, text) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            
            if (sender === 'user') msgDiv.innerText = "You: " + text;
            else if (sender === 'bot') msgDiv.innerText = "Bot: " + text;
            else msgDiv.innerText = text; // Error text
            
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
