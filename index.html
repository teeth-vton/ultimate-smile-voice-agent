<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #usd-chat-container {
            width: 320px;
            max-height: 280px;
            background-color: #111111;
            border: 1px solid #D4AF37;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
        }

        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }

        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: left; font-size: 11px; background: rgba(255,68,68,0.1); padding: 6px; border-radius: 5px; margin-top: 5px; }
        .msg-system { color: #888; font-style: italic; text-align: center; font-size: 11px; }

        #usd-status-box {
            color: #888;
            font-size: 12px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 8px;
            font-weight: bold;
        }

        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
            user-select: none;
        }

        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon { color: #111111; font-weight: bold; font-size: 24px; }

        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }
        
        .usd-listening {
            box-shadow: 0 0 15px 5px rgba(0, 255, 128, 0.4) !important; 
        }

        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <div id="usd-voice-widget">
        <div id="usd-chat-container">
            <div id="usd-chat-log"></div>
            <div id="usd-status-box">Initializing...</div>
        </div>
        
        <div id="usd-bubble" onclick="handleBubbleClick()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // NO MORE API KEYS IN THE FRONTEND!
        let agentState = 'off'; 
        let chatHistory = [];
        let recognition;
        let audioPlayer;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.interimResults = false;
            recognition.lang = 'en-IN'; 
        }

        window.onload = () => {
            audioPlayer = document.getElementById('usd-html-player');
            setupRecognitionCallbacks();
        };

        async function handleBubbleClick() {
            const container = document.getElementById('usd-chat-container');
            
            if (agentState === 'off') {
                container.style.display = 'flex';
                updateState('thinking', "Requesting microphone...");
                
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    updateState('off', "Microphone access denied.");
                    return;
                }

                updateState('speaking', "Speaking greeting...");
                
                audioPlayer.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAAAD";
                audioPlayer.play().catch(() => {});

                const greeting = "Hello! How did you like our virtual try-on?";
                logMessage('bot', greeting);
                
                await useBrowserTTS(greeting); // Initial greeting is native so we don't waste API calls
                updateState('listening', "Listening... Speak now!");
                
            } else if (agentState === 'speaking') {
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                logMessage('system', 'You interrupted the bot.');
                updateState('listening', "Listening... Speak now!");
            } else {
                updateState('off', "");
                if(recognition) recognition.abort();
                audioPlayer.pause();
                window.speechSynthesis.cancel();
                container.style.display = 'none';
            }
        }

        function updateState(newState, statusText) {
            agentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            if (statusBox) statusBox.innerText = statusText;
            if (bubble) bubble.className = ''; 
            
            if (newState === 'listening') {
                bubble.classList.add('usd-listening');
                try { recognition.start(); } catch(e) {}
            } 
            else if (newState === 'thinking') {
                bubble.classList.add('usd-speaking'); 
                try { recognition.stop(); } catch(e) {}
            }
            else if (newState === 'speaking') {
                bubble.classList.add('usd-speaking');
            }
        }

        function setupRecognitionCallbacks() {
            if (!recognition) return;

            recognition.onresult = async (event) => {
                if (agentState !== 'listening') return;
                
                const userText = event.results[0][0].transcript.trim();
                
                if (userText.length < 2) {
                    try { recognition.stop(); } catch(e){}
                    setTimeout(() => { if (agentState === 'listening') updateState('listening', "Listening... Speak now!"); }, 500);
                    return;
                }

                logMessage('user', userText);
                updateState('thinking', "Thinking...");
                
                try {
                    // Send to Vercel Database Server
                    const botReply = await processTurnThroughBackend(userText);
                    if (agentState === 'off') return; 
                    
                    logMessage('bot', botReply);
                    
                    if (agentState === 'speaking') {
                        updateState('listening', "Listening... Speak now!");
                    }

                } catch (error) {
                    logMessage('error', `Connection Error: ${error.message}`);
                    if (agentState !== 'off') {
                        updateState('thinking', "Waiting 2s to reset...");
                        await new Promise(r => setTimeout(r, 2000));
                        if (agentState !== 'off') updateState('listening', "Listening... Try again.");
                    }
                }
            };

            recognition.onerror = (event) => {
                if (agentState === 'listening' && event.error === 'no-speech') {
                    try { recognition.stop(); } catch(e){}
                    setTimeout(() => {
                        if (agentState === 'listening') {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 200);
                }
            };

            recognition.onend = () => {
                if (agentState === 'listening') {
                    try { recognition.start(); } catch(e){}
                }
            };
        }

        async function processTurnThroughBackend(userText) {
            // ---> REPLACE THIS WITH YOUR LIVE VERCEL URL
            const BACKEND_URL = "https://ultimate-smile-voice-agent-ps9x9g8a4-vton-s-projects.vercel.app/api/chat"; 
            
            const response = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userText: userText, history: chatHistory })
            });
            
            if (!response.ok) throw new Error("Vercel Server Unreachable.");
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            // Update chat history
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            chatHistory.push({ role: "model", parts: [{ text: data.replyText }] });

            // Play the Sarvam voice
            updateState('speaking', "Speaking...");
            audioPlayer.src = "data:audio/wav;base64," + data.audioBase64;
            await new Promise((resolve) => {
                audioPlayer.onended = resolve;
                audioPlayer.onerror = resolve;
                audioPlayer.play().catch(() => resolve());
            });

            return data.replyText;
        }

        function useBrowserTTS(text) {
            return new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-IN'; 
                utterance.rate = 1.0;
                utterance.onend = resolve;
                utterance.onerror = resolve;
                window.speechSynthesis.speak(utterance);
            });
        }

        function logMessage(sender, text) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            
            if (sender === 'user') msgDiv.innerText = "You: " + text;
            else if (sender === 'bot') msgDiv.innerText = "Bot: " + text;
            else msgDiv.innerText = text; 
            
            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
