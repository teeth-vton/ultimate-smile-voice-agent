<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Live Agent</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #usd-tooltip {
            background: #D4AF37;
            color: #111;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: bounce 2s infinite;
            position: relative;
            cursor: pointer;
            display: block; 
            transition: opacity 0.3s ease-in-out;
            opacity: 1;
        }
        #usd-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 30px;
            border-width: 8px 8px 0;
            border-style: solid;
            border-color: #D4AF37 transparent transparent transparent;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes floatContainer {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        #usd-chat-container {
            width: 320px;
            max-height: 380px;
            background-color: #111111;
            border: 1px solid #333333; 
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            position: relative; 
            animation: floatContainer 4s ease-in-out infinite;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        #usd-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }
        #usd-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #usd-status-box {
            color: #D4AF37;
            font-size: 13px;
            font-weight: bold;
        }
        #usd-header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #usd-mode-toggle {
            background: #222;
            color: #D4AF37;
            border: 1px solid #D4AF37;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #usd-mode-toggle:hover { background: #D4AF37; color: #111; }
        #usd-visualizer {
            display: flex;
            gap: 3px;
            align-items: center;
            height: 20px;
        }
        .usd-bar {
            width: 3px;
            background: #D4AF37;
            border-radius: 3px;
            height: 4px; 
            transition: height 0.2s ease;
        }
        #usd-visualizer.active .usd-bar { animation: usd-sound 0.4s ease-in-out infinite alternate; }
        #usd-visualizer.active .usd-bar:nth-child(1) { animation-delay: 0.0s; }
        #usd-visualizer.active .usd-bar:nth-child(2) { animation-delay: 0.2s; }
        #usd-visualizer.active .usd-bar:nth-child(3) { animation-delay: 0.1s; }
        #usd-visualizer.active .usd-bar:nth-child(4) { animation-delay: 0.3s; }
        #usd-visualizer.active .usd-bar:nth-child(5) { animation-delay: 0.1s; }
        @keyframes usd-sound { 0% { height: 4px; } 100% { height: 18px; } }
        #usd-close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
            padding: 0;
            transition: color 0.2s;
        }
        #usd-close-btn:hover { color: #ff4444; }
        #usd-chat-log {
            overflow-y: auto;
            flex-grow: 1;
            margin-bottom: 10px;
            max-height: 210px;
            padding-right: 5px;
        }
        #usd-chat-log::-webkit-scrollbar { width: 4px; }
        #usd-chat-log::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.4; }
        .msg-user { color: #ffffff; text-align: right; }
        .msg-bot { color: #D4AF37; text-align: left; }
        .msg-error { color: #ff4444; text-align: left; font-size: 11px; background: rgba(255,68,68,0.1); padding: 6px; border-radius: 5px; margin-top: 5px; }
        .usd-link-card {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 10px;
            background: linear-gradient(135deg, #111111, #222222);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .usd-link-card:hover {
            background: #D4AF37;
            color: #111111;
            transform: translateY(-2px);
        }
        #usd-interim-text { color: #888; text-align: right; font-style: italic; font-size: 12px; min-height: 16px; margin-bottom: 5px;}
        
        #usd-input-container {
            display: none; 
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
        #usd-text-input {
            flex-grow: 1;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }
        #usd-text-input:focus { border-color: #D4AF37; }
        #usd-send-btn {
            background: #D4AF37;
            color: #111;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            margin-left: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        #usd-send-btn:hover { background: #FFF8DC; }
        
        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            --pulse-max: 20px; 
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
            user-select: none;
        }
        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 var(--pulse-max) rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        #usd-inline-rating {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            text-align: center;
        }
        #usd-rating-title { color: #fff; font-size: 15px; margin-bottom: 12px; font-weight: bold; letter-spacing: 0.5px;}
        .usd-stars { display: flex; justify-content: center; gap: 12px; cursor: pointer; }
        .usd-star { 
            font-size: 28px; 
            color: #333333; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: transform 0.2s, color 0.2s, text-shadow 0.2s; 
        }
        .usd-star:hover, .usd-star.active { 
            color: #FFD700; 
            transform: scale(1.2);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }
        #usd-rating-thanks { display: none; color: #D4AF37; font-size: 13px; margin-top: 12px; font-weight: bold; }
        #usd-end-confirm-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 101;
            text-align: center;
            padding: 20px;
        }
        .usd-confirm-title { color: #fff; font-size: 16px; margin-bottom: 20px; font-weight: bold; }
        .usd-confirm-btns { display: flex; gap: 15px; }
        .usd-btn-yes { background: #ff4444; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .usd-btn-no { background: #444; color: #fff; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        @media (max-width: 480px) {
            #usd-voice-widget { bottom: 15px; right: 15px; }
            #usd-bubble { width: 50px; height: 50px; } 
            #usd-bubble svg { width: 24px; height: 24px; }
            #usd-chat-container { 
                width: calc(100vw - 40px); 
                max-height: 380px; 
                padding: 12px; 
                margin-bottom: 10px; 
            }
            #usd-chat-log { max-height: 160px; } 
            #usd-tooltip { font-size: 12px; padding: 8px 12px; margin-bottom: 10px; }
            #usd-tooltip::after { right: 20px; }
        }
    </style>
</head>
<body>

    <audio id="usd-html-player" preload="auto"></audio>

    <div id="usd-voice-widget">
        <div id="usd-tooltip" onclick="openChat(false)">
            Namaste! Tap here to talk about your new smile!
        </div>

        <div id="usd-chat-container">
            <div id="usd-end-confirm-overlay">
                <div class="usd-confirm-title">Want to end the call?</div>
                <div class="usd-confirm-btns">
                    <button class="usd-btn-yes" onclick="confirmEndChat(true)">Yes</button>
                    <button class="usd-btn-no" onclick="confirmEndChat(false)">No</button>
                </div>
            </div>

            <div id="usd-chat-inner-wrap" style="height: 100%; display: flex; flex-direction: column;">
                <div id="usd-chat-header">
                    <div id="usd-header-left">
                        <img src="https://raw.githubusercontent.com/teeth-vton/sd-voice-backend/dab01d9f2e96be2fcda278af63db62dfef9e1559/Gemini_Generated_Image_67gd1767gd1767gd.png" alt="USD Assistant" width="24" height="24" style="object-fit: contain;">
                        <div id="usd-status-box">Connected 🟢</div>
                    </div>
                    <div id="usd-header-right">
                        <button id="usd-mode-toggle" onclick="toggleChatMode()">🎙️ Voice</button>
                        <div id="usd-visualizer">
                            <div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div><div class="usd-bar"></div>
                        </div>
                        <button id="usd-close-btn" onclick="closeChatBtnClicked()">✕</button>
                    </div>
                </div>

                <div id="usd-chat-log"></div>
                <div id="usd-interim-text"></div>
                
                <div id="usd-input-container">
                    <input type="text" id="usd-text-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                    <button type="button" id="usd-send-btn" onclick="submitTextMessage()">Send</button>
                </div>

                <div id="usd-inline-rating">
                    <div id="usd-rating-title">Rate your experience</div>
                    <div class="usd-stars">
                        <span class="usd-star" onclick="submitRating(1)">★</span>
                        <span class="usd-star" onclick="submitRating(2)">★</span>
                        <span class="usd-star" onclick="submitRating(3)">★</span>
                        <span class="usd-star" onclick="submitRating(4)">★</span>
                        <span class="usd-star" onclick="submitRating(5)">★</span>
                    </div>
                    <div id="usd-rating-thanks">Thank you! Transcript sent to our team.</div>
                </div>
            </div>
        </div>
        
        <div id="usd-bubble" onclick="openChat(false)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#111111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>
        </div>
    </div>

    <script>
        const RENDER_BACKEND_URL = "https://nikjoshi123-usd-voice-backend.hf.space";
        const WS_URL = "wss://nikjoshi123-usd-voice-backend.hf.space";

        let currentAgentState = 'off'; 
        let chatHistory = [];
        let socket = null;
        let globalStream = null;
        let isVoiceMode = true; 
        
        let audioCtx = null;
        let audioChunkQueue = [];
        let nextExpectedChunkIndex = 0;
        let totalExpectedChunks = -1;
        let isAudioPlaying = false;
        let activeAudioSource = null;
        let activeTag = null; 
        let activeBotMessageDiv = null; 

        // SOFTWARE MUTE SWITCH (Fixes mobile beeps)
        let isMicSoftwareMuted = true; 
        let backgroundNoise = 15;

        const usdLinks = {
            '[LINK_HOME]': { url: 'https://ultimatesmiledesign.com/', label: '🏠 Go to Home Page', voice: 'Now you are on our home page.' },
            '[LINK_DENTISTS]': { url: 'https://ultimatesmiledesign.com/certified-dentists/', label: '📍 Find Nearest Dentist', voice: 'Please allow location permission to find your nearest dentist. Add your details and we will reach out to you soon.' },
            '[LINK_VTRYON]': { url: 'https://ultimatesmiledesign.com/virtual-smile-try-on/', label: '✨ Virtual Smile Try-On', voice: 'Click design my smile now to know how your beautiful smile looks after treatment.' }, 
            '[LINK_BLOGS]': { url: 'https://ultimatesmiledesign.com/virtual-smile-try-on/', label: '📰 Read Our Blogs', voice: 'Now you are on our blogs page.' }, 
            '[LINK_GALLERY]': { url: 'https://ultimatesmiledesign.com/gallery/', label: '🖼️ Check Out Gallery', voice: 'Now you are on our gallery page.' },
            '[LINK_CONSULT]': { url: 'https://ultimatesmiledesign.com/consult-with-dentist/', label: '👨‍⚕️ Consult Expert Dentist', voice: 'Please fill the answers to get a response from our expert dentist.' },
            '[LINK_CONTACT]': { url: 'https://ultimatesmiledesign.com/contact/', label: '📞 Contact Us', voice: 'Please fill the answers to get a response from us.' },
            '[LINK_CONNECT]': { url: 'https://ultimatesmiledesign.com/dentist-connect/', label: '🤝 Become Certified Dentist', voice: 'Now you are on our dentist connect page.' }
        };

        window.onload = async () => {
            if (sessionStorage.getItem('usd_chat_active') === 'true') {
                await openChat(true);
            }
        };

        let lastScrollY = window.scrollY || 0;
        let scrollTimeout = null;

        window.addEventListener('scroll', () => {
            const currentScrollY = window.scrollY || document.documentElement.scrollTop;
            const tooltip = document.getElementById('usd-tooltip');
            const bubble = document.getElementById('usd-bubble');
            
            if (currentScrollY > 30) {
                tooltip.style.opacity = '0';
                tooltip.style.pointerEvents = 'none';
            } else {
                tooltip.style.opacity = '1';
                tooltip.style.pointerEvents = 'auto';
            }

            let scrollSpeed = Math.abs(currentScrollY - lastScrollY);
            lastScrollY = currentScrollY;

            let dynamicPulseSize = Math.min(20 + (scrollSpeed * 1.5), 80);
            bubble.style.setProperty('--pulse-max', `${dynamicPulseSize}px`);

            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                bubble.style.setProperty('--pulse-max', '20px');
            }, 150);
        });

        function saveSessionState() {
            sessionStorage.setItem('usd_chat_active', 'true');
            sessionStorage.setItem('usd_chat_history', JSON.stringify(chatHistory));
            sessionStorage.setItem('usd_is_voice_mode', isVoiceMode.toString());
        }

        function clearSessionState() {
            sessionStorage.removeItem('usd_chat_active');
            sessionStorage.removeItem('usd_chat_history');
            sessionStorage.removeItem('usd_is_voice_mode');
        }

        function updateState(newState, statusText = null) {
            currentAgentState = newState;
            const statusBox = document.getElementById('usd-status-box');
            const visualizer = document.getElementById('usd-visualizer');

            if (statusBox) {
                if (newState === 'connecting' || newState === 'off') {
                    if (statusText) statusBox.innerText = statusText;
                } else if (isVoiceMode) {
                    statusBox.innerText = "Connected 🟢"; 
                } else {
                    statusBox.innerText = "Chat Mode Active. Type below.";
                }
            }

            if (newState === 'speaking') {
                if (isVoiceMode) visualizer.classList.add('active');
            } else {
                if (isVoiceMode) visualizer.classList.remove('active');
            }

            if (newState === 'listening' && isVoiceMode) {
                isMicSoftwareMuted = false;
            } else {
                isMicSoftwareMuted = true;
            }
        }

        async function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            gainNode.gain.value = 0; 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start(0);
            oscillator.stop(audioCtx.currentTime + 0.001);
        }

       async function playAudioChunk(base64) {
            return new Promise((resolve) => {
                if (!base64) { resolve(); return; } 
                
                updateState('speaking');

                const audioEl = document.getElementById('usd-html-player');
                audioEl.src = "data:audio/wav;base64," + base64;
                
                audioEl.playbackRate = 1.15;
                audioEl.preservesPitch = true;
                audioEl.mozPreservesPitch = true;
                audioEl.webkitPreservesPitch = true;

                audioEl.onended = () => { resolve(); };
                audioEl.onerror = () => { resolve(); };
                audioEl.play().catch(e => { resolve(); });
            });
        }

        async function processAudioQueue() {
            if (isAudioPlaying) return;
            
            audioChunkQueue.sort((a, b) => a.index - b.index);

            if (audioChunkQueue.length > 0 && audioChunkQueue[0].index === nextExpectedChunkIndex) {
                isAudioPlaying = true;
                const chunk = audioChunkQueue.shift();
                nextExpectedChunkIndex++;
                
                await playAudioChunk(chunk.audioBase64);
                
                isAudioPlaying = false;
                
                if (nextExpectedChunkIndex === totalExpectedChunks && audioChunkQueue.length === 0) {
                    totalExpectedChunks = -1;
                    nextExpectedChunkIndex = 0;
                    
                    if (activeTag === '[END_CHAT]') {
                        setTimeout(() => closeChat(true), 2000);
                    } else {
                        updateState('cooldown');
                        setTimeout(() => {
                            if (currentAgentState === 'cooldown') {
                                updateState('listening');
                            }
                        }, 800);
                    }
                    activeTag = null; 
                } else {
                    processAudioQueue(); 
                }
            }
        }

        function interruptBot() {
            audioChunkQueue = [];
            totalExpectedChunks = -1;
            nextExpectedChunkIndex = 0;
            
            const audioEl = document.getElementById('usd-html-player');
            if (audioEl) {
                audioEl.pause();
                audioEl.currentTime = 0;
            }

            if (activeAudioSource) {
                try { activeAudioSource.stop(); } catch(e) {}
                activeAudioSource = null;
            }
        }

        function toggleChatMode() {
            isVoiceMode = !isVoiceMode;
            const toggleBtn = document.getElementById('usd-mode-toggle');
            const visualizer = document.getElementById('usd-visualizer');
            const textControls = document.getElementById('usd-input-container');
            const micText = document.getElementById('usd-interim-text');
            
            if (isVoiceMode) {
                toggleBtn.innerText = "💬 Text";
                visualizer.style.display = "flex";
                textControls.style.display = "none";
                micText.style.display = "block";
                updateState('listening');
            } else {
                toggleBtn.innerText = "🎙️ Voice";
                visualizer.style.display = "none";
                textControls.style.display = "flex";
                micText.style.display = "none";
                interruptBot();
                updateState('listening');
            }
            sessionStorage.setItem('usd_is_voice_mode', isVoiceMode.toString());
        }

        async function openChat(isRestore = false) {
            initAudio();
            const container = document.getElementById('usd-chat-container');
            const tooltip = document.getElementById('usd-tooltip');
            const bubble = document.getElementById('usd-bubble');
            
            if (currentAgentState === 'off' || isRestore) {
                bubble.style.display = 'none'; 
                container.style.display = 'flex';
                tooltip.style.opacity = '0'; 
                tooltip.style.pointerEvents = 'none';
                
                document.getElementById('usd-input-container').style.display = 'flex';
                document.getElementById('usd-inline-rating').style.display = 'none';
                document.getElementById('usd-mode-toggle').style.display = 'block';
                
                if (isRestore) {
                    chatHistory = JSON.parse(sessionStorage.getItem('usd_chat_history') || '[]');
                    isVoiceMode = sessionStorage.getItem('usd_is_voice_mode') !== 'false';
                    
                    const toggleBtn = document.getElementById('usd-mode-toggle');
                    toggleBtn.innerText = isVoiceMode ? "🎙️ Voice" : "💬 Text";
                    if(isVoiceMode) document.getElementById('usd-visualizer').style.display = 'flex';
                    else document.getElementById('usd-visualizer').style.display = 'none';
                    
                    document.getElementById('usd-chat-log').innerHTML = ""; 
                    chatHistory.forEach(turn => {
                        const sender = turn.role === 'model' ? 'bot' : 'user';
                        let cleanText = turn.parts[0].text.replace(/\[.*?\]/g, '').trim();
                        let foundTag = null;
                        if (turn.role === 'model') {
                            for (const tag in usdLinks) {
                                if (turn.parts[0].text.includes(tag)) { foundTag = tag; break; }
                            }
                        }
                        logMessage(sender, cleanText, foundTag);
                    });

                    updateState('thinking');
                    await startWebSocket();
                } else {
                    if(isVoiceMode) document.getElementById('usd-visualizer').style.display = 'flex';
                    document.getElementById('usd-chat-log').innerHTML = ""; 
                    chatHistory = [];
                    
                    updateState('connecting', "Calling assistant... 🟡");
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    updateState('connecting', "Connected 🟢");
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const greeting = "Namaste! How can we assist you today?";
                    logMessage('bot', greeting);
                    
                    if (isVoiceMode) {
                        try {
                            const response = await fetch(`${RENDER_BACKEND_URL}/api/tts`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ text: greeting, lang: 'en-IN' })
                            });
                            const data = await response.json();
                            await playAudioChunk(data.audioBase64);
                            
                            updateState('cooldown');
                            setTimeout(() => { 
                                if(currentAgentState === 'cooldown') {
                                    updateState('listening');
                                }
                            }, 800);
                        } catch(e) {}
                    }
                    
                    sessionStorage.setItem('usd_chat_active', 'true');
                    await startWebSocket();
                }
            }
        }

        async function startWebSocket() {
            try {
                socket = new WebSocket(WS_URL);

                socket.onopen = async () => {
                    globalStream = await navigator.mediaDevices.getUserMedia({ 
                        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: false }
                    });

                    const streamCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                    const source = streamCtx.createMediaStreamSource(globalStream);
                    
                    const bufferSize = 4096;
                    const processor = streamCtx.createScriptProcessor(bufferSize, 1, 1);
                    
                    const analyser = streamCtx.createAnalyser();
                    analyser.fftSize = 512;

                    source.connect(analyser);
                    source.connect(processor);
                    processor.connect(streamCtx.destination); 

                    let isRecording = false;
                    let interimInterval = null; 
                    let longPauseTimer = null; 
                    let maxRecordingTimer = null;
                    let consecutiveLoudFrames = 0; 

                    processor.onaudioprocess = (e) => {
                        if (isMicSoftwareMuted) return;
                        
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcm16 = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                        }
                        
                        if (socket && socket.readyState === WebSocket.OPEN && isRecording) {
                            socket.send(pcm16.buffer); 
                        }
                    };

                    function detectVoice() {
                        if (isMicSoftwareMuted) {
                            requestAnimationFrame(detectVoice); return;
                        }

                        const dataArray = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(dataArray);
                        
                        let voiceSum = 0; let voiceBins = 0;
                        for (let i = 10; i < 96; i++) { voiceSum += dataArray[i]; voiceBins++; }
                        let humanVolume = voiceSum / voiceBins;

                        if (humanVolume < backgroundNoise * 2) {
                            backgroundNoise = (backgroundNoise * 0.98) + (humanVolume * 0.02);
                        }
                        let dynamicThreshold = Math.max(25, backgroundNoise + 15);

                        if (currentAgentState === 'speaking') {
                            if (humanVolume > dynamicThreshold + 10) { 
                                consecutiveLoudFrames++;
                                if (consecutiveLoudFrames > 10) { 
                                    interruptBot();
                                    updateState('listening');
                                    isRecording = true;
                                    
                                    if (socket && socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'interrupt' }));
                                        socket.send(JSON.stringify({ type: 'start_of_speech' }));
                                    }
                                }
                            } else {
                                consecutiveLoudFrames = 0; 
                            }
                            requestAnimationFrame(detectVoice); return;
                        }

                        // FIXED: TRUE STREAMING INTERIM INTERVAL
                        if (currentAgentState === 'listening') {
                            if (humanVolume > dynamicThreshold) { 
                                if (!isRecording) {
                                    isRecording = true;
                                    
                                    if (socket.readyState === WebSocket.OPEN) {
                                        socket.send(JSON.stringify({ type: 'start_of_speech' }));
                                    }

                                    // ⚡ FIX: Steady Heartbeat Interval for Interim Processing (800ms)
                                    interimInterval = setInterval(() => {
                                        if (isRecording && socket.readyState === WebSocket.OPEN) {
                                            socket.send(JSON.stringify({ type: 'process_interim' }));
                                        }
                                    }, 800); 
                                    
                                    maxRecordingTimer = setTimeout(() => {
                                        if (isRecording) {
                                            isRecording = false;
                                            clearInterval(interimInterval); // Clear the interval
                                            updateState('thinking');
                                            document.getElementById('usd-interim-text').innerText = ""; 
                                            if (socket.readyState === WebSocket.OPEN) {
                                                socket.send(JSON.stringify({ type: 'process_final', history: chatHistory, isVoiceMode: isVoiceMode }));
                                            }
                                        }
                                    }, 14000); 
                                }
                                
                                clearTimeout(longPauseTimer);

                                // Silence Detector (600ms of pure silence to cut off)
                                longPauseTimer = setTimeout(() => {
                                    if (isRecording) {
                                        isRecording = false;
                                        clearInterval(interimInterval); // Clear the interval
                                        clearTimeout(maxRecordingTimer);
                                        updateState('thinking');
                                        document.getElementById('usd-interim-text').innerText = ""; 
                                        if (socket.readyState === WebSocket.OPEN) {
                                            socket.send(JSON.stringify({ type: 'process_final', history: chatHistory, isVoiceMode: isVoiceMode }));
                                        }
                                    }
                                }, 600); 
                            }
                        }
                        requestAnimationFrame(detectVoice);
                    }
                    
                    detectVoice();
                };

                socket.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    
                    if (data.type === 'idle') {
                        document.getElementById('usd-interim-text').innerText = "";
                        updateState('listening');
                    }
                    else if (data.type === 'user_spoken_text') {
                        document.getElementById('usd-interim-text').innerText = ""; 
                        logMessage('user', data.text);
                    }
                    else if (data.type === 'interim_transcript') {
                        document.getElementById('usd-interim-text').innerText = data.text;
                    }
                    else if (data.type === 'text_stream') {
                        if (!activeBotMessageDiv) {
                            const log = document.getElementById('usd-chat-log');
                            activeBotMessageDiv = document.createElement('div');
                            activeBotMessageDiv.className = `msg msg-bot`;
                            activeBotMessageDiv.innerText = "Assistant: ";
                            log.appendChild(activeBotMessageDiv);
                        }
                        activeBotMessageDiv.innerText = "Assistant: " + data.text;
                        const log = document.getElementById('usd-chat-log');
                        log.scrollTop = log.scrollHeight;
                    }
                    else if (data.type === 'audio_chunk') {
                        audioChunkQueue.push(data);
                        processAudioQueue();
                    }
                    else if (data.type === 'reply_complete') {
                        activeBotMessageDiv = null; 
                        
                        chatHistory.push({ role: "model", parts: [{ text: data.botText }] });
                        sessionStorage.setItem('usd_chat_history', JSON.stringify(chatHistory));

                        activeTag = data.tag;
                        totalExpectedChunks = data.totalChunks;
                        
                        if (activeTag && usdLinks[activeTag]) {
                            const log = document.getElementById('usd-chat-log');
                            const lastBotMsg = log.lastElementChild;
                            const btn = document.createElement('button');
                            btn.className = 'usd-link-card';
                            btn.innerText = usdLinks[activeTag].label;
                            btn.onclick = () => handleLinkClick(activeTag);
                            lastBotMsg.appendChild(btn);
                            log.scrollTop = log.scrollHeight;
                        }
                        
                        if (!isVoiceMode || totalExpectedChunks === 0) {
                            updateState('listening');
                            if (activeTag === '[END_CHAT]') setTimeout(() => closeChat(true), 2000);
                        }
                    }
                    else if (data.type === 'error') {
                        document.getElementById('usd-interim-text').innerText = "";
                        updateState('listening');
                    }
                };

                socket.onerror = () => { updateState('listening'); };

            } catch (err) {
                updateState('listening');
            }
        }

        function closeChatBtnClicked() {
            document.getElementById('usd-end-confirm-overlay').style.display = 'flex';
        }

        async function confirmEndChat(isYes) {
            document.getElementById('usd-end-confirm-overlay').style.display = 'none';
            if (isYes) {
                updateState('thinking');
                interruptBot();
                
                const goodbyeText = "Thanks for talking with Ultimate Smile Design. Please feel free to reach out to us at our contact page.";
                logMessage('bot', goodbyeText);
                
                if (isVoiceMode) {
                    try {
                        const response = await fetch(`${RENDER_BACKEND_URL}/api/tts`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ text: goodbyeText, lang: 'en-IN' })
                        });
                        const data = await response.json();
                        await playAudioChunk(data.audioBase64);
                        closeChat(true);
                    } catch(e) { closeChat(true); }
                } else {
                    setTimeout(() => closeChat(true), 2000);
                }
            }
        }

        function closeChat(showRating = false) {
            updateState('off');
            interruptBot();
            if (socket) socket.close();
            if (globalStream) globalStream.getTracks().forEach(track => track.stop());
            
            sessionStorage.removeItem('usd_chat_active');
            sessionStorage.removeItem('usd_chat_history');
            
            if (showRating) {
                document.getElementById('usd-input-container').style.display = 'none';
                document.getElementById('usd-mode-toggle').style.display = 'none';
                document.getElementById('usd-visualizer').style.display = 'none';
                document.getElementById('usd-inline-rating').style.display = 'block';
                logMessage('system', 'The chat has ended. Please rate your experience below.');
            } else {
                document.getElementById('usd-chat-container').style.display = 'none';
                document.getElementById('usd-bubble').style.display = 'flex'; 
            }
        }

        async function submitRating(stars) {
            const starElements = document.querySelectorAll('.usd-star');
            starElements.forEach((s, index) => {
                s.style.color = index < stars ? '#FFD700' : '#444';
                s.style.textShadow = index < stars ? '0 0 10px rgba(255, 215, 0, 0.6)' : '0 2px 4px rgba(0,0,0,0.5)';
            });
            document.getElementById('usd-rating-thanks').style.display = 'block';

            try {
                let transcript = "No chat history recorded.";
                if (chatHistory && chatHistory.length > 0) {
                    transcript = chatHistory.map(turn => `${turn.role === 'user' ? 'User' : 'Agent'}: ${turn.parts[0].text}`).join('\n\n');
                }

                await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ 
                        access_key: "c1a373a7-407e-47f4-8403-be692c2f3eff", 
                        subject: `🌟 New USD Voice Agent Rating: ${stars}/5 Stars`, 
                        from_name: "Ultimate Smile Voice Agent", 
                        email: "noreply@ultimatesmiledesign.com",
                        message: `Transcript:\n\n${transcript}` 
                    })
                });
            } catch(e) { }

            setTimeout(() => { closeChat(false); }, 3000);
        }

        async function submitTextMessage() {
            const inputEl = document.getElementById('usd-text-input');
            const userText = inputEl.value.trim();
            if (!userText || currentAgentState === 'thinking' || currentAgentState === 'connecting') return;

            inputEl.value = ''; 
            interruptBot();

            updateState('thinking');
            document.getElementById('usd-interim-text').innerText = ""; 
            
            logMessage('user', userText);
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ 
                    type: 'text_input', 
                    text: userText, 
                    history: chatHistory,
                    isVoiceMode: isVoiceMode 
                }));
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                submitTextMessage();
            }
        }

       async function handleLinkClick(tag) {
            const linkInfo = usdLinks[tag];
            
            logMessage('bot', "Redirecting you now...");
            chatHistory.push({ role: "model", parts: [{ text: "Redirecting you now..." }] });

            window.open(linkInfo.url, '_blank');
            updateState('listening');
        }
        
        function logMessage(sender, text, tag = null) {
            const log = document.getElementById('usd-chat-log');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg msg-${sender}`;
            
            if (sender === 'user') msgDiv.innerText = "You: " + text;
            else if (sender === 'bot') msgDiv.innerText = "Assistant: " + text;
            else msgDiv.innerText = text; 
            
            if (tag && usdLinks[tag]) {
                const btn = document.createElement('button');
                btn.className = 'usd-link-card';
                btn.innerText = usdLinks[tag].label;
                btn.onclick = () => handleLinkClick(tag);
                msgDiv.appendChild(btn);
            }

            log.appendChild(msgDiv);
            log.scrollTop = log.scrollHeight;
        }
    </script>
