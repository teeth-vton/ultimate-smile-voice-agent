<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Smile Design - Floating Agent</title>
    <style>
        #usd-voice-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        #usd-status-box {
            background-color: #111111;
            color: #D4AF37;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #D4AF37;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: none;
        }
        #usd-bubble {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFD700, #B8860B);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
            animation: usd-pulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #111111;
            transition: transform 0.2s ease-in-out;
        }
        #usd-bubble:hover { transform: scale(1.05); }
        #usd-bubble:active { transform: scale(0.95); }
        #usd-bubble-icon {
            color: #111111;
            font-weight: bold;
            font-size: 24px;
            line-height: 1;
        }
        .usd-speaking {
            animation: usd-speaking-wave 0.5s infinite alternate !important;
            background: linear-gradient(135deg, #FFF8DC, #FFD700) !important;
        }
        @keyframes usd-pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
        @keyframes usd-speaking-wave {
            0% { transform: scale(1); box-shadow: 0 0 15px #FFD700; }
            100% { transform: scale(1.15); box-shadow: 0 0 30px #FFD700; }
        }
    </style>
</head>
<body>

    <div id="usd-voice-widget">
        <div id="usd-status-box">Click to speak...</div>
        <div id="usd-bubble" onclick="startVoiceAgent()">
            <span id="usd-bubble-icon">🎙️</span>
        </div>
    </div>

    <script>
        // Your restricted Google AI Studio AQ. Auth Key
        const GEMINI_API_KEY = "AQ.Ab8RN6KBVrNFbrrUh4N_A6MhqpwjbtB3IILUHM0ZWACu-LCM9A"; 
        
        let webSocket;
        let audioContext;       
        let playbackContext;    
        let mediaStream;
        let isConnected = false;
        let nextPlayTime = 0;   

        async function startVoiceAgent() {
            const statusBox = document.getElementById('usd-status-box');
            const bubble = document.getElementById('usd-bubble');
            
            if (isConnected) return; 

            statusBox.style.display = 'block';
            statusBox.innerText = "Connecting microphone...";

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                statusBox.innerText = "Connecting to AI...";

                playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                nextPlayTime = playbackContext.currentTime;

                const wsUrl = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BidiGenerateContent?key=${GEMINI_API_KEY}`;
                webSocket = new WebSocket(wsUrl);

                webSocket.onopen = () => {
                    isConnected = true;
                    statusBox.innerText = "Listening... Speak now!";
                    bubble.classList.add('usd-speaking');
                    
                    const setupMessage = {
                        setup: {
                            // CORRECTED: The exact dedicated Live API model
                            model: "models/gemini-2.5-flash-live-preview", 
                            generationConfig: {
                                responseModalities: ["AUDIO"]
                            },
                            systemInstruction: {
                                parts: [{
                                    text: "You are the official voice assistant for Ultimate Smile Design. Instantly say: 'Namaste! Did you like our virtual try-on?'. Seamlessly mirror the user's language. Strictly answer only dental or smile design questions."
                                }]
                            }
                        }
                    };
                    webSocket.send(JSON.stringify(setupMessage));
                    startAudioRecording();
                };

                webSocket.onmessage = async (event) => {
                    const response = JSON.parse(event.data);
                    
                    if (response.setupComplete) {
                        const initialTurn = { 
                            clientContent: { 
                                turns: [{ role: "user", parts: [{ text: "Hello" }] }],
                                turnComplete: true
                            } 
                        };
                        webSocket.send(JSON.stringify(initialTurn));
                    }

                    if (response.serverContent?.modelTurn?.parts) {
                        for (const part of response.serverContent.modelTurn.parts) {
                            if (part.inlineData) {
                                playAudioChunk(part.inlineData.data);
                            }
                        }
                    }
                };

                webSocket.onerror = (err) => {
                    console.error("WebSocket Error: ", err);
                    statusBox.innerText = "Connection Error. Check console.";
                    resetUI();
                };

                webSocket.onclose = (event) => {
                    console.log("Session Closed. Code:", event.code, "Reason:", event.reason);
                    statusBox.innerText = "Session ended.";
                    setTimeout(() => statusBox.style.display = 'none', 3000);
                    resetUI();
                };

            } catch (error) {
                statusBox.innerText = "Mic access denied or error.";
                console.error(error);
                resetUI();
            }
        }

        function resetUI() {
            isConnected = false;
            document.getElementById('usd-bubble').classList.remove('usd-speaking');
            if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
            if (audioContext) audioContext.close();
        }

        async function startAudioRecording() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = audioContext.createMediaStreamSource(mediaStream);
            const processor = audioContext.createScriptProcessor(2048, 1, 1);

            source.connect(processor);
            processor.connect(audioContext.destination);

            processor.onaudioprocess = (e) => {
                const inputData = e.inputBuffer.getChannelData(0);
                const pcmBuffer = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    pcmBuffer[i] = Math.min(1, Math.max(-1, inputData[i])) * 0x7FFF;
                }
                const base64Audio = btoa(String.fromCharCode(...new Uint8Array(pcmBuffer.buffer)));
                
                if (webSocket && webSocket.readyState === WebSocket.OPEN) {
                    webSocket.send(JSON.stringify({
                        realtimeInput: {
                            mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: base64Audio }]
                        }
                    }));
                }
            };
        }

        function playAudioChunk(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const pcm16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(pcm16.length);
            for (let i = 0; i < pcm16.length; i++) float32[i] = pcm16[i] / 32768.0;

            const audioBuffer = playbackContext.createBuffer(1, float32.length, 24000);
            audioBuffer.getChannelData(0).set(float32);

            const source = playbackContext.createBufferSource();
            source.buffer = audioBuffer;
            source.connect(playbackContext.destination);
            
            const scheduleTime = Math.max(nextPlayTime, playbackContext.currentTime);
            source.start(scheduleTime);
            nextPlayTime = scheduleTime + audioBuffer.duration;
        }
    </script>
</body>
</html>
